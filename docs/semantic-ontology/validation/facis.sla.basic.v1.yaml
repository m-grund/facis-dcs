id: facis.sla.basic.v1
version: "1"
description: Basic FACIS SLA contract statement validation profile.
rules:
  - id: exactly-one-provider
    type: count
    severity: error
    message: Contract requires exactly one provider.
    where:
      "@type": "https://w3id.org/facis/dcs/ontology/v1#CompanyParty"
      role: "https://w3id.org/facis/dcs/taxonomy/v1#role-provider"
    operator: eq
    value: 1
  - id: exactly-one-customer
    type: count
    severity: error
    message: Contract requires exactly one customer.
    where:
      "@type": "https://w3id.org/facis/dcs/ontology/v1#CompanyParty"
      role: "https://w3id.org/facis/dcs/taxonomy/v1#role-customer"
    operator: eq
    value: 1
  - id: availability-slo-required
    type: required_fields
    severity: error
    message: Availability SLO is incomplete.
    where:
      "@type": "https://w3id.org/facis/dcs/ontology/v1#SLO"
    requiredFields:
      - availability
  - id: payment-required
    type: required_fields
    severity: error
    message: Payment term is incomplete.
    where:
      "@type": "https://w3id.org/facis/dcs/ontology/v1#PaymentTerm"
    requiredFields:
      - amount
      - currency
      - dueDate
  - id: payment-amount-positive
    type: comparison
    severity: error
    message: Payment amount must be greater than 0.
    target: amount
    where:
      "@type": "https://w3id.org/facis/dcs/ontology/v1#PaymentTerm"
    operator: gt
    value: 0
  - id: FACIS-CONTRACT-POLICY-002
    type: value_in
    severity: error
    message: Contract jurisdiction must be allowed.
    target: contract.jurisdiction
    values:
      - DEU
      - AUT
      - CHE
      - FRA
      - NLD
      - BEL
      - LUX
      - POL
      - CZE
      - ESP
      - ITA
      - GBR
      - USA
      - DNK
      - SWE
      - NOR
      - FIN
      - IRL
      - PRT
      - GRC
      - CAN
      - JPN
      - AUS
  - id: FACIS-CONTRACT-POLICY-003
    type: comparison
    severity: error
    message: Service availability must satisfy policy minimum.
    target: service.sla.availability
    operator: gte
    value: 99.9
  - id: FACIS-CONTRACT-POLICY-004
    type: comparison
    severity: error
    message: Service response time must satisfy policy maximum.
    target: service.sla.responseTime
    operator: lte
    value: 15
  - id: FACIS-CONTRACT-POLICY-005
    type: comparison
    severity: error
    message: Service resolution time must satisfy policy maximum.
    target: service.sla.resolutionTime
    operator: lte
    value: 240
  - id: FACIS-CONTRACT-POLICY-006
    type: signature_level_at_least
    severity: error
    message: Signature level must satisfy policy.
    target: signature.requiredLevel
    value: AES
