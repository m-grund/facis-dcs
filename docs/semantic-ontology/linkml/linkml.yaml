id: https://w3id.org/facis/dcs/schema
name: dcs-schema
description: Digital Contracting Service semantic schema

prefixes:
  linkml: "https://w3id.org/linkml/"
  dcs: "https://w3id.org/facis/dcs/ontology/v1#"
  odrl: "http://www.w3.org/ns/odrl/2/"
  xsd: "http://www.w3.org/2001/XMLSchema#"
  taxonomy: "https://w3id.org/facis/dcs/taxonomy/v1#"
  dcterms: "http://purl.org/dc/terms/"
  prov: "http://www.w3.org/ns/prov#"

# emit_prefixes controls which prefixes appear as explicit entries in the
# generated JSON-LD context. dcs is intentionally excluded: it is the
# default_prefix and is therefore emitted as @vocab; having it also as an
# explicit named prefix would cause json-gold to prefer the dcs:-prefixed form
# over bare term names during compaction. schema is omitted here because
# linkml:types already defines it as https://schema.org/; re-declaring it
# causes a prefix-mismatch error in the generator.
emit_prefixes:
  - xsd
  - dcterms
  - linkml
  - odrl
  - prov
  - schema
  - taxonomy

imports:
  - linkml:types

default_prefix: dcs
default_range: string

classes:
  
  ContractTemplate:
    class_uri: dcs:ContractTemplate
    close_mappings:
      - schema:CreativeWork
    slot_usage:
      metadata:
        required: true
    slots:
      - documentTitle
      - contractData
      - documentStructure
      - metadata
      - policies
      - signatureFields

  SignatureField:
    class_uri: dcs:SignatureField
    slot_usage:
      signatoryName:
        required: true
    slots:
      - signatoryName
      - title

  DataRequirement:
    class_uri: dcs:DataRequirement
    slot_usage:
      conditionId:
        required: true
      fields:
        required: true
    slots:
      - conditionId
      - fields
      - name
      - schemaVersion

  RequirementField:
    class_uri: dcs:RequirementField
    close_mappings:
      - schema:PropertyValue
    slot_usage:
      parameterName:
        required: true
    slots:
      - domainField
      - parameterName
      - required

  DocumentStructure:
    class_uri: dcs:DocumentStructure
    slots:
      - layout

  Clause:
    class_uri: dcs:Clause
    close_mappings:
      - schema:Article
    slots:
      - title

  Section:
    class_uri: dcs:Section
    close_mappings:
      - schema:Article
    slots:
      - title

  TextBlock:
    class_uri: dcs:TextBlock
    close_mappings:
      - schema:Text
    slots:
      - text

  Placeholder:
    class_uri: dcs:Placeholder
    slots:
      - bindsTo
      - token

  TemplateMetadata:
    class_uri: dcs:TemplateMetadata
    slot_usage:
      title:
        required: true
    slots:
      - createdAt
      - createdBy
      - description
      - did
      - name
      - schemaVersion
      - sourceSystemType
      - state
      - templateType
      - templateVersion
      - title
      - updatedAt
      - uuid

  LayoutNode:
    class_uri: dcs:LayoutNode
    slots:
      - isRoot

  KPIObservation:
    class_uri: dcs:KPIObservation
    description: One KPI value a contract target system reported for a deployed contract.
    close_mappings:
      - schema:Observation
    slot_usage:
      metricName:
        required: true
      observedValue:
        required: true
    slots:
      - aboutContract
      - metricName
      - observedAt
      - observedValue
      - violation

  KPIObservationSet:
    class_uri: dcs:KPIObservationSet
    description: The KPI observations reported for one contract.
    slots:
      - observation

slots:

  documentTitle:
    slot_uri: dcs:documentTitle
    range: string

  contractData:
    slot_uri: dcs:contractData
    range: DataRequirement
    multivalued: true

  documentStructure:
    slot_uri: dcs:documentStructure
    range: DocumentStructure

  metadata:
    slot_uri: dcs:metadata
    range: TemplateMetadata

  policies:
    slot_uri: dcs:policies
    range: uriorcurie
    multivalued: true
    close_mappings:
      - odrl:hasPolicy

  signatureFields:
    slot_uri: dcs:signatureFields
    range: SignatureField
    multivalued: true

  signatoryName:
    slot_uri: dcs:signatoryName
    range: string
    description: Machine-readable identifier for the signatory role; used as the AcroForm /T field name.

  conditionId:
    slot_uri: dcs:conditionId
    range: string

  fields:
    slot_uri: dcs:fields
    range: RequirementField
    multivalued: true
    close_mappings:
      - schema:property

  name:
    slot_uri: dcs:name
    range: string
    close_mappings:
      - schema:name

  schemaVersion:
    slot_uri: dcs:schemaVersion
    range: string
    close_mappings:
      - schema:schemaVersion

  blocks:
    slot_uri: dcs:blocks
    multivalued: true
    list_elements_ordered: true
    close_mappings:
      - schema:hasPart
    any_of:
      - range: Clause
      - range: Section
      - range: TextBlock

  domainField:
    slot_uri: dcs:domainField
    range: uriorcurie
    close_mappings:
      - schema:propertyID

  parameterName:
    slot_uri: dcs:parameterName
    range: string

  required:
    slot_uri: dcs:required
    range: boolean
    close_mappings:
      - schema:valueRequired

  semanticPath:
    slot_uri: dcs:semanticPath
    range: string

  title:
    slot_uri: dcs:title
    range: string
    exact_mappings:
      - dcterms:title

  text:
    slot_uri: dcs:text
    range: string
    close_mappings:
      - schema:text

  token:
    slot_uri: dcs:token
    range: string

  templateType:
    slot_uri: dcs:templateType
    range: string
    close_mappings:
      - dcterms:type

  templateVersion:
    slot_uri: dcs:templateVersion
    range: integer
    close_mappings:
      - schema:version

  createdAt:
    slot_uri: dcs:createdAt
    range: string
    exact_mappings:
      - dcterms:created

  createdBy:
    slot_uri: dcs:createdBy
    range: string
    close_mappings:
      - dcterms:creator

  did:
    slot_uri: dcs:did
    range: string
    close_mappings:
      - dcterms:identifier

  sourceSystemType:
    slot_uri: dcs:sourceSystemType
    range: string

  state:
    slot_uri: dcs:state
    range: string

  updatedAt:
    slot_uri: dcs:updatedAt
    range: string
    exact_mappings:
      - dcterms:modified

  uuid:
    slot_uri: dcs:uuid
    range: string
    close_mappings:
      - dcterms:identifier

  description:
    slot_uri: dcs:description
    range: string
    exact_mappings:
      - dcterms:description

  layout:
    slot_uri: dcs:layout
    range: LayoutNode
    multivalued: true
    list_elements_ordered: false

  children:
    slot_uri: dcs:children
    multivalued: true
    list_elements_ordered: true
    close_mappings:
      - schema:hasPart
    any_of:
      - range: LayoutNode
      - range: Section
      - range: Clause
      - range: TextBlock

  isRoot:
    slot_uri: dcs:isRoot
    range: boolean

  content:
    slot_uri: dcs:content
    multivalued: true
    list_elements_ordered: true
    any_of:
      - range: string
      - range: Placeholder

  bindsTo:
    slot_uri: dcs:bindsTo
    range: RequirementField

  wasDerivedFrom:
    abstract: true
    slot_uri: prov:wasDerivedFrom
    range: uriorcurie

  wasRevisionOf:
    abstract: true
    slot_uri: prov:wasRevisionOf
    range: uriorcurie

  derivedFromTemplate:
    slot_uri: dcs:derivedFromTemplate
    is_a: wasDerivedFrom
    range: uriorcurie
    description: The template this contract instance was derived from.

  renewsContract:
    slot_uri: dcs:renewsContract
    is_a: wasRevisionOf
    range: uriorcurie
    description: The prior contract instance this renewal supersedes.

  metricName:
    slot_uri: dcs:metricName
    range: string
    close_mappings:
      - schema:name

  observedValue:
    slot_uri: dcs:observedValue
    range: string
    close_mappings:
      - schema:value

  observedAt:
    slot_uri: dcs:observedAt
    range: datetime

  violation:
    slot_uri: dcs:violation
    range: boolean
    description: Whether the observed value violates an obligation the contract's own ODRL policies declare for the metric.

  aboutContract:
    slot_uri: dcs:aboutContract
    range: uriorcurie
    close_mappings:
      - schema:about

  observation:
    slot_uri: dcs:observation
    range: KPIObservation
    multivalued: true
