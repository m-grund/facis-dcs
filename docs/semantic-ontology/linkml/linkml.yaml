id: https://w3id.org/facis/dcs/schema
name: dcs-schema
default_range: string

prefixes:
  linkml: "https://w3id.org/linkml/"
  "dcs": "https://w3id.org/facis/dcs/ontology/v1#",
  "odrl": "http://www.w3.org/ns/odrl/2/",
  "xsd": "http://www.w3.org/2001/XMLSchema#",
  "taxonomy": "https://w3id.org/facis/dcs/taxonomy/v1#"

default_prefix: dcs

classes:
  # Die einzelnen Klassen (@Type) der JSON-LD-Daten werden hier als LinkML-Klassen modelliert

  DataRequirement:
    class_uri: dcs:DataRequirement
    slots:
      - id
      - conditionId
      - fields
      - name
      - schemaVersion

  RequirementField:
    description: >-
      Ein einzelnes Datenfeld innerhalb einer DataRequirement, das auf ein
      Taxonomie-Feld in einem externen System verweist.
    class_uri: dcs:RequirementField
    slots:
      - id
      - domainField
      - parameterName
      - required
      - semanticPath

slots:
  # Hier werden die einzelnen Felder der JSON-LD-Daten als LinkML-Slots modelliert, die dann in den Klassen referenziert werden

  id:
    slot_uri: "@id"
    identifier: true
    range: uriorcurie
    description: >-
      Eindeutige (DID-)URI des Knotens, entspricht @id in den JSON-LD-Daten.
      Bei dieser Datenquelle z.B. eine DID-URI mit Fragment, z.B.
      "did:web:localhost:template:<uuid>#requirement-<uuid>". Falls die
      Bestandteile (Template-DID, Typ-Praefix, UUID) einzeln benoetigt
      werden, muessen sie separat aus diesem String geparst werden -- LinkML
      bildet sie nicht automatisch als eigene Felder ab.

  conditionId:
    slot_uri: dcs:conditionId
    range: string
    description: UUID, das die zugehoerige Bedingung referenziert.
    # TODO: falls immer UUID-Format -> pattern ergaenzen, z.B.:
    # pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"

  fields:
    slot_uri: dcs:fields
    range: RequirementField
    multivalued: true
    inlined: true
    inlined_as_list: true
    description: Liste der Einzelfelder dieser DataRequirement.

  name:
    slot_uri: dcs:name
    range: string

  schemaVersion:
    slot_uri: dcs:schemaVersion
    range: string
    # TODO: falls es nur eine feste Menge von Werten gibt (z.B. "v1", "v2"),
    # lohnt sich hier ein echtes Enum statt freiem string, z.B.:
    # range: SchemaVersionEnum

  domainField:
    slot_uri: dcs:domainField
    range: uriorcurie
    description: >-
      Reine Referenz (IRI) auf ein Taxonomie-Feld in einem externen System.
      Wird bewusst NICHT als eigene Klasse modelliert, da die Taxonomie
      kein Teil dieses Schemas ist.

  parameterName:
    slot_uri: dcs:parameterName
    range: string
    description: Dot-Notation-Pfad des Parameters, z.B. "contract.jurisdiction".

  required:
    slot_uri: dcs:required
    range: boolean

  semanticPath:
    slot_uri: dcs:semanticPath
    range: string