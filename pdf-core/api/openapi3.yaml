openapi: 3.0.3
info:
    title: DCS-PDF-CORE semantic ledger engine
    description: Deterministic PDF/A-3a compiler and semantic ledger engine
    version: 0.1.0
servers:
    - url: http://localhost:8080
tags:
    - name: dcspdfcore
      description: DCS-PDF-CORE endpoints
paths:
    /download:
        post:
            tags:
                - dcspdfcore
            summary: Compile JSON-LD to PDF
            description: Compile deterministic PDF/A-3a bytes from a JSON-LD payload
            operationId: download
            requestBody:
                required: true
                content:
                    application/ld+json:
                        schema:
                            type: object
                            description: JSON-LD or plain-JSON semantic payload
                        example:
                            '@context':
                                '@vocab': http://localhost:8080/ontology/dcs-pdf-core#
                                dcs-pdf-core: http://localhost:8080/ontology/dcs-pdf-core#
                            '@id': urn:doc:example
                            '@type': dcs-pdf-core:Document
                            title: Example Contract
                            sections:
                                - '@type': dcs-pdf-core:Section
                                  heading: 1. Terms
                                  clauses:
                                    - The parties agree to the following terms.
            responses:
                "200":
                    description: OK response.
                    content:
                        application/pdf:
                            schema:
                                type: string
                                format: binary
                "400":
                    $ref: '#/components/responses/BadRequest'
                "415":
                    $ref: '#/components/responses/UnsupportedMediaType'
    /verify:
        post:
            tags:
                - dcspdfcore
            summary: Verify PDF and append C2PA witness
            description: Verify that a PDF was compiled from its embedded payload, then append a C2PA witness
            operationId: verify
            requestBody:
                required: true
                content:
                    application/pdf:
                        schema:
                            type: string
                            format: binary
                            description: Compiled PDF document to verify
            responses:
                "200":
                    description: OK response.
                    content:
                        application/pdf:
                            schema:
                                type: string
                                format: binary
                "400":
                    $ref: '#/components/responses/BadRequest'
                "409":
                    $ref: '#/components/responses/Conflict'
                "415":
                    $ref: '#/components/responses/UnsupportedMediaType'
                "422":
                    $ref: '#/components/responses/UnprocessableEntity'
    /update:
        post:
            tags:
                - dcspdfcore
            summary: Amend PDF with new JSON-LD payload
            description: 'Amend an existing PDF with a new JSON-LD payload via multipart/form-data (fields: pdf, payload)'
            operationId: update
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            required:
                                - pdf
                                - payload
                            properties:
                                pdf:
                                    type: string
                                    format: binary
                                    description: Existing PDF document to amend
                                payload:
                                    type: string
                                    format: binary
                                    description: New JSON-LD semantic payload
            responses:
                "200":
                    description: OK response.
                    content:
                        application/pdf:
                            schema:
                                type: string
                                format: binary
                "400":
                    $ref: '#/components/responses/BadRequest'
                "409":
                    $ref: '#/components/responses/Conflict'
                "415":
                    $ref: '#/components/responses/UnsupportedMediaType'
    /claim:
        post:
            tags:
                - dcspdfcore
            summary: Claim PDF with JSON-LD payload
            description: Verify that a supplied JSON-LD payload produces the same page content as the submitted PDF (which need not contain embedded metadata). Returns the canonical compiled PDF — with the JSON-LD embedded and a C2PA verification witness — as evidence of the match.
            operationId: claim
            requestBody:
                required: true
                content:
                    multipart/form-data:
                        schema:
                            type: object
                            required:
                                - pdf
                                - payload
                            properties:
                                pdf:
                                    type: string
                                    format: binary
                                    description: PDF whose page content is being claimed (embedded JSON-LD need not be present)
                                payload:
                                    type: string
                                    format: binary
                                    description: JSON-LD document claiming to produce the submitted PDF
            responses:
                "200":
                    description: OK response.
                    content:
                        application/pdf:
                            schema:
                                type: string
                                format: binary
                "400":
                    $ref: '#/components/responses/BadRequest'
                "409":
                    $ref: '#/components/responses/Conflict'
                "415":
                    $ref: '#/components/responses/UnsupportedMediaType'
    /ontology/dcs-pdf-core:
        get:
            tags:
                - dcspdfcore
            summary: Serve JSON-LD context
            description: Serve the DCS-PDF-CORE JSON-LD context document
            operationId: ontologyContext
            responses:
                "200":
                    description: OK response.
                    content:
                        application/ld+json:
                            schema:
                                type: string
                                format: binary
    /ontology/dcs-pdf-core.owl:
        get:
            tags:
                - dcspdfcore
            summary: Serve OWL ontology
            description: Serve the DCS-PDF-CORE OWL ontology definition as JSON-LD
            operationId: ontologyOwl
            responses:
                "200":
                    description: OK response.
                    content:
                        application/ld+json:
                            schema:
                                type: string
                                format: binary
components:
    schemas:
        Error:
            type: object
            required:
                - name
                - id
                - message
                - temporary
                - timeout
                - fault
            properties:
                name:
                    type: string
                    description: Name is the name of this class of errors.
                    example: bad_request
                id:
                    type: string
                    description: ID is a unique identifier for this particular occurrence of the problem.
                    example: 123abc
                message:
                    type: string
                    description: Message is a human-readable explanation specific to this occurrence of the problem.
                    example: parameter 'p' must be an integer
                temporary:
                    type: boolean
                    description: Is the error temporary?
                    example: false
                timeout:
                    type: boolean
                    description: Is the error a timeout?
                    example: false
                fault:
                    type: boolean
                    description: Is the error a server-side fault?
                    example: false
    responses:
        BadRequest:
            description: Bad Request response.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
        Conflict:
            description: Conflict response.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
        UnsupportedMediaType:
            description: Unsupported Media Type response.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
        UnprocessableEntity:
            description: Unprocessable Entity response.
            content:
                application/json:
                    schema:
                        $ref: '#/components/schemas/Error'
