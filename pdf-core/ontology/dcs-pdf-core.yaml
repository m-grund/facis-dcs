id: http://127.0.0.1:8080/ontology/dcs-pdf-core
name: dcs_pdf_core
title: dcs-pdf-core Structural Document Ontology
description: >-
  Base ontology for the dcs-pdf-core deterministic PDF/A-3a compiler. Defines
  structural document primitives used to drive human-readable layout generation
  from an embedded JSON-LD data twin. Content items within clauses are expressed
  using standard JSON-LD patterns: plain strings for prose, @id for ontology
  references, schema:url for external links, and @value/@type for typed literals.
  Additional namespaced properties not defined in this ontology (e.g. ODRL
  policies, provenance graphs) are carried through in the embedded JSON-LD
  attachment unchanged and are not rendered in the human-readable PDF output.

prefixes:
  linkml: https://w3id.org/linkml/
  dcs_pdf_core: http://127.0.0.1:8080/ontology/dcs-pdf-core#
  rdfs: http://www.w3.org/2000/01/rdf-schema#
  owl: http://www.w3.org/2002/07/owl#
  xsd: http://www.w3.org/2001/XMLSchema#
  schema: http://schema.org/

default_prefix: dcs_pdf_core
default_range: string

imports:
  - linkml:types

subsets: {}

classes:

  Document:
    description: >-
      A deterministic PDF/A-3a document produced by the dcs-pdf-core compiler. Acts as
      the root node of the semantic payload graph. The title and sections slots
      drive the human-readable PDF layout. Any additional JSON-LD properties or
      namespaces not defined in this ontology are preserved in the embedded
      JSON-LD attachment and not rendered in the PDF.
    slots:
      - title
      - sections
      - signatureFields
    slot_usage:
      title:
        required: true
    class_uri: dcs_pdf_core:Document

  Section:
    description: >-
      A headed section within a document, analogous to a numbered article or
      clause block in a legal contract. The heading is rendered as a PDF heading
      structural element and added to the PDF outline (bookmarks). Each clause
      in the section is rendered as a tagged paragraph. Sections may contain
      nested subsections to arbitrary depth.
    slots:
      - heading
      - clauses
      - subsections
    slot_usage:
      heading:
        required: true
      clauses:
        required: true
    class_uri: dcs_pdf_core:Section

  Clause:
    description: >-
      A structured clause entry containing mixed-content inline segments. The
      content list may include prose strings and JSON-LD node objects such as
      ontology references, external links, or typed literal values.
    slots:
      - content
    slot_usage:
      content:
        required: true
    class_uri: dcs_pdf_core:Clause

  ContentNode:
    description: >-
      Generic JSON-LD node object used inside clause content arrays for ontology
      references, external links, and typed literals.
    class_uri: dcs_pdf_core:ContentNode

  SignatureField:
    description: >-
      A visible signature field placeholder rendered in the compiled PDF as an
      AcroForm /Sig widget annotation. Field names are stable anchors used by
      external PAdES signing tools.
    slots:
      - name
      - label
    slot_usage:
      name:
        required: true
    class_uri: dcs_pdf_core:SignatureField

slots:
  title:
    description: Canonical document title.
    range: string
    slot_uri: dcs_pdf_core:title

  sections:
    description: >-
      Ordered list of headed sections constituting the document body. Each
      section carries a heading and an array of clauses. A top-level clauses
      array (without sections) is also accepted and treated as a single
      anonymous section.
    range: Section
    multivalued: true
    inlined_as_list: true
    slot_uri: dcs_pdf_core:sections

  heading:
    description: >-
      Human-readable section heading rendered as a PDF heading structural
      element and added to the PDF outline bookmarks tree. The heading level
      (H1, H2, H3, …) is determined by nesting depth.
    range: string
    slot_uri: dcs_pdf_core:heading

  clauses:
    description: >-
      Ordered list of clause content items within a section. Each entry is
      either a plain string (prose) or a JSON-LD node object. Node objects
      dispatch on key presence: @id renders as an ontology reference with a
      glossary link; schema:url renders as an external hyperlink; @value/@type
      renders as a typed literal. Mixed-content arrays (where a clause is itself
      an array of these items) are supported for inline rich text.
    any_of:
      - range: string
      - range: Clause
    multivalued: true
    inlined_as_list: true
    slot_uri: dcs_pdf_core:clauses

  subsections:
    description: >-
      Ordered list of nested subsections. Each subsection is itself a Section
      and may contain further subsections, enabling arbitrary nesting depth.
      The heading level of each subsection is determined by its depth in the
      nesting hierarchy.
    range: Section
    multivalued: true
    inlined_as_list: true
    slot_uri: dcs_pdf_core:subsections

  content:
    description: >-
      Ordered mixed-content inline segments for a clause. Entries may be plain
      text or JSON-LD node objects (e.g. @id links, schema:url links, typed
      values).
    any_of:
      - range: string
      - range: ContentNode
    multivalued: true
    inlined_as_list: true
    slot_uri: dcs_pdf_core:content

  signatureFields:
    description: >-
      Ordered list of visible signature field definitions rendered as AcroForm
      signature widgets on a dedicated final page.
    range: SignatureField
    multivalued: true
    inlined_as_list: true
    slot_uri: dcs_pdf_core:signatureFields

  name:
    description: Stable PDF field name used in /T for a signature widget.
    range: string
    slot_uri: dcs_pdf_core:name

  label:
    description: Human-readable label drawn in the signature field appearance.
    range: string
    slot_uri: dcs_pdf_core:label
