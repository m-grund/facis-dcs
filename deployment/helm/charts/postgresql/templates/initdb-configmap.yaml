{{- if .Values.additionalDatabases }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-postgresql-initdb
data:
  create-additional-databases.sh: |
    #!/bin/bash
    set -e
    {{- range .Values.additionalDatabases }}
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" \
      -tc "SELECT 1 FROM pg_database WHERE datname = '{{ . }}'" | grep -q 1 || \
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" \
        -c "CREATE DATABASE \"{{ . }}\";"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" \
      -c "GRANT ALL PRIVILEGES ON DATABASE \"{{ . }}\" TO \"$POSTGRES_USER\";"
    echo "Database {{ . }} ready"
    {{- end }}
{{- end }}
