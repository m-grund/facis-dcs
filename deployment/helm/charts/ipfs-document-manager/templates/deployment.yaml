apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ipfs-document-manager
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ipfs-document-manager
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ipfs-document-manager
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: ipfs-document-manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.config.listenPort | default 8080 }}
              protocol: TCP
          env:
            - name: IPFS_HOST
              value: {{ .Values.ipfs.host | quote }}
            - name: IPFS_API_GATEWAY_URL
              value: {{ .Values.ipfs.apiGatewayURL | quote }}
            - name: IPFS_RPC_API_PORT
              value: {{ .Values.ipfs.rpcApiPort | default 5001 | quote }}
            - name: IPFS_LOG_LEVEL
              value: {{ .Values.ipfs.logLevel | default "info" | quote }}
            - name: IPFSMANAGER_SERVERMODE
              value: {{ .Values.config.serverMode | default "production" | quote }}
            - name: IPFSMANAGER_LISTEN_PORT
              value: {{ .Values.config.listenPort | default 8080 | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /v1/metrics/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            successThreshold: 2
            failureThreshold: 2
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/metrics/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
