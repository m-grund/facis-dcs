apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ipfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ipfs
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ipfs
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: ipfs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: gateway
              containerPort: 8080
              protocol: TCP
            - name: api
              containerPort: 5001
              protocol: TCP
            - name: swarm-tcp
              containerPort: 4001
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/v0/id
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: ipfs-data
              mountPath: /data/ipfs
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
      volumes:
        - name: ipfs-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-ipfs
          {{- else }}
          emptyDir: {}
          {{- end }}
