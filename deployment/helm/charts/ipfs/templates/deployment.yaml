apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ipfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ipfs
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ipfs
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- if .Values.api.cors.enabled }}
      initContainers:
        - name: ipfs-config
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              if [ ! -f /data/ipfs/config ]; then
                ipfs init
              fi
              ipfs config Addresses.API /ip4/0.0.0.0/tcp/5001
              ipfs config Addresses.Gateway /ip4/0.0.0.0/tcp/8080
              ipfs config --json API.HTTPHeaders.Access-Control-Allow-Origin '{{ toJson .Values.api.cors.allowOrigins }}'
              ipfs config --json API.HTTPHeaders.Access-Control-Allow-Methods '{{ toJson .Values.api.cors.allowMethods }}'
              ipfs config --json API.HTTPHeaders.Access-Control-Allow-Headers '{{ toJson .Values.api.cors.allowHeaders }}'
              ipfs config --json API.HTTPHeaders.Access-Control-Allow-Credentials '["{{ .Values.api.cors.allowCredentials }}"]'
              chown -R 1000:100 /data/ipfs
          volumeMounts:
            - name: ipfs-data
              mountPath: /data/ipfs
      {{- end }}
      containers:
        - name: ipfs
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: gateway
              containerPort: 8080
              protocol: TCP
            - name: api
              containerPort: 5001
              protocol: TCP
            - name: swarm-tcp
              containerPort: 4001
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: ipfs-data
              mountPath: /data/ipfs
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
      volumes:
        - name: ipfs-data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-ipfs
          {{- else }}
          emptyDir: {}
          {{- end }}