{{- if .Values.portal.enabled }}
{{- $keycloakPath := "" }}
{{- if .Values.keycloak.routePath }}
{{- $keycloakPath = printf "/%s" (trimAll "/" .Values.keycloak.routePath) }}
{{- end }}
{{- $keycloakExternalUrl := "" }}
{{- if .Values.keycloak.issuerUrl }}
{{- /* Strip /realms/... suffix if present so we get just the base URL */}}
{{- $keycloakExternalUrl = .Values.keycloak.issuerUrl }}
{{- else if .Values.keycloak.hostname }}
{{- $keycloakExternalUrl = printf "%s://%s%s" (.Values.keycloak.issuerScheme | default "https") .Values.keycloak.hostname $keycloakPath }}
{{- else }}
{{- $keycloakExternalUrl = printf "http://%s-keycloak:%d%s" .Release.Name (.Values.keycloak.port | default 8080 | int) $keycloakPath }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-federated-catalogue-portal
spec:
  replicas: {{ .Values.portal.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: federated-catalogue-portal
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: federated-catalogue-portal
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: fc-demo-portal
          image: "{{ .Values.portal.image.repository }}:{{ .Values.portal.image.tag }}"
          imagePullPolicy: {{ .Values.portal.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 8088
          env:
            - name: FEDERATED_CATALOGUE_BASE_URI
              value: {{ printf "http://%s-federated-catalogue:%d%s" .Release.Name (.Values.service.port | default 8081 | int) (.Values.route.path | default "") | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI
              value: {{ printf "%s/realms/%s" $keycloakExternalUrl (.Values.keycloak.realm | default "gaia-x") | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_FC_CLIENT_OIDC_CLIENT_ID
              value: {{ .Values.portal.keycloak.clientId | default .Values.keycloak.clientId | default "federated-catalogue" | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_FC_CLIENT_OIDC_CLIENT_SECRET
              value: {{ .Values.portal.keycloak.clientSecret | default .Values.keycloak.clientSecret | default "federated-catalogue-secret" | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_FC_CLIENT_OIDC_SCOPE
              value: "openid,profile,email"
            {{- if .Values.portal.route.path }}
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: {{ .Values.portal.route.path | quote }}
            {{- end }}
            {{- with .Values.portal.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: logs
              mountPath: /logs
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: {{ .Values.portal.route.path | default "" }}/actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: {{ .Values.portal.route.path | default "" }}/actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.portal.resources | nindent 12 }}
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
{{- end }}
