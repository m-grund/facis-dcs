apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-statuslist-service
  labels:
    app.kubernetes.io/name: statuslist-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: statuslist-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: statuslist-service
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: statuslist-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port | default 8080 }}
              protocol: TCP
          env:
            - name: STATUSLIST_LISTEN_PORT
              value: {{ .Values.service.port | default 8080 | quote }}
            - name: STATUSLIST_LOG_LEVEL
              value: {{ .Values.logging.level | default "INFO" | quote }}
            {{- if .Values.database.enabled }}
            - name: STATUSLIST_DATABASE_HOST
              value: {{ .Values.database.host | quote }}
            - name: STATUSLIST_DATABASE_PORT
              value: {{ .Values.database.port | default "5432" | quote }}
            - name: STATUSLIST_DATABASE_DATABASE
              value: {{ .Values.database.name | default "statuslist" | quote }}
            - name: STATUSLIST_DATABASE_USER
              value: {{ .Values.database.user | quote }}
            - name: STATUSLIST_DATABASE_PASSWORD
              value: {{ .Values.database.password | quote }}
            - name: STATUSLIST_DATABASE_PARAMS
              value: {{ printf "sslmode:%s" (.Values.database.sslMode | default "disable") | quote }}
            - name: STATUSLIST_AUTO_MIGRATE
              value: "true"
            {{- end }}
            {{- if .Values.nats.url }}
            - name: STATUSLIST_NATS_URL
              value: {{ .Values.nats.url | quote }}
            - name: STATUSLIST_NATS_REQUEST_TIMEOUT
              value: {{ .Values.nats.timeout | default "10s" | quote }}
            - name: STATUSLIST_NATS_QUEUE_GROUP
              value: {{ .Values.nats.queueGroup | default "statuslistservice" | quote }}
            {{- end }}
            {{- if .Values.topics.creation }}
            - name: STATUSLIST_CREATIONTOPIC
              value: {{ .Values.topics.creation | quote }}
            - name: STATUSLIST_SIGNER_TOPIC
              value: {{ .Values.topics.signer | quote }}
            {{- end }}
            {{- if .Values.listSize }}
            - name: STATUSLIST_LISTSIZEINBYTES
              value: {{ .Values.listSize | quote }}
            {{- end }}
            {{- if .Values.cors.enabled }}
            - name: CORS_ENABLED
              value: "true"
            {{- if .Values.cors.allowOrigins }}
            - name: CORS_ALLOW_ORIGINS
              value: {{ .Values.cors.allowOrigins | join "," | quote }}
            {{- end }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /v1/metrics/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/metrics/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
