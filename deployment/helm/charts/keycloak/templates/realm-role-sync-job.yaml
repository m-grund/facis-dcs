{{- if .Values.realm.import }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-keycloak-role-sync
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: role-sync
          image: alpine:3.19
          env:
            - name: KC_URL
              value: "http://{{ .Release.Name }}-keycloak:{{ .Values.service.port }}"
            - name: KC_REALM
              value: "gaia-x"
            - name: KC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-keycloak
                  key: admin-user
            - name: KC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-keycloak
                  key: admin-password
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              apk add --no-cache curl jq >/dev/null 2>&1

              echo "Waiting for Keycloak to be ready..."
              until curl -sf "$KC_URL/realms/master" >/dev/null 2>&1; do
                sleep 5
              done

              echo "Getting admin token..."
              ADMIN_TOKEN=$(curl -sf -X POST \
                "$KC_URL/realms/master/protocol/openid-connect/token" \
                -H "Content-Type: application/x-www-form-urlencoded" \
                --data-urlencode "grant_type=password" \
                --data-urlencode "client_id=admin-cli" \
                --data-urlencode "username=$KC_ADMIN_USER" \
                --data-urlencode "password=$KC_ADMIN_PASSWORD" \
                | jq -r '.access_token')

              echo "Resolving client UUIDs..."
              FC_UUID=$(curl -sf -H "Authorization: Bearer $ADMIN_TOKEN" \
                "$KC_URL/admin/realms/$KC_REALM/clients?clientId=federated-catalogue" \
                | jq -r '.[0].id')
              DCS_UUID=$(curl -sf -H "Authorization: Bearer $ADMIN_TOKEN" \
                "$KC_URL/admin/realms/$KC_REALM/clients?clientId=dcs-fc-client" \
                | jq -r '.[0].id')
              SA_ID=$(curl -sf -H "Authorization: Bearer $ADMIN_TOKEN" \
                "$KC_URL/admin/realms/$KC_REALM/clients/$DCS_UUID/service-account-user" \
                | jq -r '.id')

              echo "  federated-catalogue UUID: $FC_UUID"
              echo "  dcs-fc-client UUID:        $DCS_UUID"
              echo "  service-account user ID:   $SA_ID"

              echo "Ensuring SCHEMA_* roles exist on federated-catalogue client..."
              for ROLE in SCHEMA_CREATE SCHEMA_READ SCHEMA_UPDATE SCHEMA_DELETE; do
                STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                  -H "Authorization: Bearer $ADMIN_TOKEN" \
                  "$KC_URL/admin/realms/$KC_REALM/clients/$FC_UUID/roles/$ROLE")
                if [ "$STATUS" = "404" ]; then
                  echo "  Creating role: $ROLE"
                  curl -sf -X POST \
                    -H "Authorization: Bearer $ADMIN_TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "{\"name\":\"$ROLE\"}" \
                    "$KC_URL/admin/realms/$KC_REALM/clients/$FC_UUID/roles"
                else
                  echo "  Role already exists: $ROLE"
                fi
              done

              echo "Assigning SCHEMA_* roles to service-account-dcs-fc-client..."
              SCHEMA_ROLES=$(curl -sf -H "Authorization: Bearer $ADMIN_TOKEN" \
                "$KC_URL/admin/realms/$KC_REALM/clients/$FC_UUID/roles" \
                | jq '[.[] | select(.name | startswith("SCHEMA_"))]')
              curl -sf -X POST \
                -H "Authorization: Bearer $ADMIN_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$SCHEMA_ROLES" \
                "$KC_URL/admin/realms/$KC_REALM/users/$SA_ID/role-mappings/clients/$FC_UUID"

              echo "Role sync complete. Final role mappings:"
              curl -sf -H "Authorization: Bearer $ADMIN_TOKEN" \
                "$KC_URL/admin/realms/$KC_REALM/users/$SA_ID/role-mappings/clients/$FC_UUID" \
                | jq -r '.[].name' | sort | sed 's/^/  /'
{{- end }}
