apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mongodb
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
    - name: mongo
      port: {{ .Values.service.port | default 27017 }}
      targetPort: mongo
      protocol: TCP
      {{- if and (eq (.Values.service.type | default "ClusterIP") "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
---
# Headless service for stable StatefulSet pod DNS
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mongodb-headless
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
      protocol: TCP
  selector:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/instance: {{ .Release.Name }}
