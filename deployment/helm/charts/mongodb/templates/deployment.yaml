apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-mongodb
spec:
  serviceName: {{ .Release.Name }}-mongodb-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      initContainers:
        - name: rs-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: RS_HOST
              value: "{{ .Release.Name }}-mongodb-0.{{ .Release.Name }}-mongodb-headless.{{ .Release.Namespace }}.svc.cluster.local:27017"
            - name: MONGO_USER
              value: {{ .Values.auth.username | quote }}
            - name: MONGO_PASS
              value: {{ .Values.auth.password | quote }}
          command:
            - /bin/bash
            - -c
            - |
              # Create keyfile for RS auth (required when --auth + --replSet are used)
              echo "devKeyFileForLocalDevelopmentOnlyNotForProduction" > /etc/mongo/keyfile
              chmod 400 /etc/mongo/keyfile

              mongod --replSet rs0 --bind_ip_all --dbpath /data/db \
                --keyFile /etc/mongo/keyfile &
              MONGOD_PID=$!

              until mongosh --eval "db.adminCommand('ping')" --quiet &>/dev/null; do sleep 1; done

              mongosh --quiet --eval "
                try { rs.status(); print('RS already initialized') }
                catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'$RS_HOST'}]}); print('RS initiated') }
              "

              until mongosh --eval "rs.isMaster().ismaster" --quiet 2>/dev/null | grep -q "true"; do sleep 1; done
              echo "Primary elected, creating user"

              mongosh --quiet admin --eval "
                try {
                  db.createUser({user:'$MONGO_USER',pwd:'$MONGO_PASS',roles:[{role:'root',db:'admin'}]});
                  print('User created')
                } catch(e) { print('User already exists: ' + e.message) }
              "

              kill $MONGOD_PID; wait $MONGOD_PID || true
              echo "Init complete"
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: keyfile
              mountPath: /etc/mongo
      containers:
        - name: mongodb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - mongod
            - --replSet
            - rs0
            - --bind_ip_all
            - --auth
            - --keyFile
            - /etc/mongo/keyfile
          ports:
            - name: mongo
              containerPort: 27017
          readinessProbe:
            exec:
              command:
                - mongosh
                - -u
                - {{ .Values.auth.username | quote }}
                - -p
                - {{ .Values.auth.password | quote }}
                - --authenticationDatabase
                - admin
                - --eval
                - "db.adminCommand('ping')"
                - --quiet
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data
              mountPath: /data/db
            - name: keyfile
              mountPath: /etc/mongo
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-mongodb
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: keyfile
          emptyDir: {}
