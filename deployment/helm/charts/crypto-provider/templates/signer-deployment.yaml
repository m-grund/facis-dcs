apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-crypto-provider-signer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: crypto-provider-signer
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: crypto-provider-signer
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        # Main signer service – exposes the HTTP API (POST /v1/sign, /v1/credential/proof, …)
        - name: signer
          image: "{{ .Values.signer.image.repository }}:{{ .Values.signer.image.tag }}"
          imagePullPolicy: {{ .Values.signer.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.signer.port }}
          env:
            # gRPC address of the vault-plugin sidecar (loopback – same pod)
            - name: CRYPTO_GRPC_ADDR
              value: "127.0.0.1:{{ .Values.vaultPlugin.grpcPort }}"
            - name: HTTP_PORT
              value: {{ .Values.signer.port | quote }}
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_ENCODING
              value: "json"
          readinessProbe:
            httpGet:
              path: /readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          {{- with .Values.signer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

        # Vault plugin sidecar – handles Vault transit calls over gRPC
        - name: vault-plugin
          image: "{{ .Values.vaultPlugin.image.repository }}:{{ .Values.vaultPlugin.image.tag }}"
          imagePullPolicy: {{ .Values.vaultPlugin.image.pullPolicy }}
          ports:
            - name: grpc
              containerPort: {{ .Values.vaultPlugin.grpcPort }}
          env:
            - name: CRYPTO_PROVIDER_HASHICORP_VAULT_ADDRESS
              value: "0.0.0.0:{{ .Values.vaultPlugin.grpcPort }}"
            - name: VAULT_ADDRESS
              value: "http://{{ .Release.Name }}-crypto-provider-vault:{{ .Values.vault.service.port }}"
            - name: VAULT_ADRESS
              value: "http://{{ .Release.Name }}-crypto-provider-vault:{{ .Values.vault.service.port }}"
            - name: VAULT_TOKEN
              value: {{ .Values.vault.dev.rootToken | quote }}
            - name: TRANSIT_MOUNT_PATH
              value: {{ .Values.transit.mount | quote }}
            - name: TRANSIT_KEY_NAME
              value: {{ .Values.transit.key | quote }}
          {{- with .Values.vaultPlugin.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
