{{- if .Values.devCertChain.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-dev-cert-chain
  labels:
    app.kubernetes.io/name: crypto-provider
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-dev-cert-chain
  labels:
    app.kubernetes.io/name: crypto-provider
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-dev-cert-chain
  labels:
    app.kubernetes.io/name: crypto-provider
    app.kubernetes.io/instance: {{ .Release.Name }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-dev-cert-chain
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-dev-cert-chain
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-dev-cert-chain
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-dev-cert-chain
      restartPolicy: OnFailure
      containers:
        - name: provision-dev-cert-chain
          image: "{{ .Values.devCertChain.image.repository }}:{{ .Values.devCertChain.image.tag }}"
          imagePullPolicy: {{ .Values.devCertChain.image.pullPolicy }}
          env:
            - name: VAULT_ADDR
              value: "http://{{ .Release.Name }}-crypto-provider-vault:{{ .Values.vault.service.port }}"
            - name: VAULT_TOKEN
              value: {{ .Values.vault.dev.rootToken | quote }}
            - name: TRANSIT_MOUNT
              value: {{ .Values.transit.mount | quote }}
            - name: KEY_NAME
              value: {{ .Values.transit.key | quote }}
            - name: SECRET_NAME
              value: {{ default (printf "%s-crypto-provider-dev-cert-chain" .Release.Name) .Values.devCertChain.secretName | quote }}
            - name: SECRET_CHAIN_KEY
              value: {{ .Values.devCertChain.secretKey | quote }}
            - name: SECRET_CA_KEY
              value: {{ .Values.devCertChain.caCertKey | quote }}
            - name: LEAF_CN
              value: {{ .Values.devCertChain.leafCommonName | quote }}
            - name: CA_CN
              value: {{ .Values.devCertChain.caCommonName | quote }}
            - name: VALIDITY_DAYS
              value: {{ printf "%v" .Values.devCertChain.validityDays | quote }}
            - name: OVERWRITE_SECRET
              value: {{ ternary "true" "false" .Values.devCertChain.overwrite | quote }}
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              apk add --no-cache curl jq openssl >/dev/null

              until curl -fsS "${VAULT_ADDR}/v1/sys/health" >/dev/null 2>&1; do
                echo "Waiting for Vault API..."
                sleep 2
              done

              vault_key_json="$(curl -fsS \
                -H "X-Vault-Token: ${VAULT_TOKEN}" \
                "${VAULT_ADDR}/v1/${TRANSIT_MOUNT}/keys/${KEY_NAME}")"

              key_type="$(printf '%s' "${vault_key_json}" | jq -r '.data.type')"
              if [ "${key_type}" != "ecdsa-p256" ]; then
                echo "Expected transit key type ecdsa-p256 for ES256, got '${key_type}'"
                exit 1
              fi

              latest_version="$(printf '%s' "${vault_key_json}" | jq -r '.data.latest_version | tostring')"
              transit_pubkey="$(printf '%s' "${vault_key_json}" | jq -r --arg v "${latest_version}" '.data.keys[$v].public_key')"
              if [ -z "${transit_pubkey}" ] || [ "${transit_pubkey}" = "null" ]; then
                echo "Transit public key not found for key ${KEY_NAME} version ${latest_version}"
                exit 1
              fi

              workdir="$(mktemp -d)"
              trap 'rm -rf "${workdir}"' EXIT

              printf '%s\n' "${transit_pubkey}" > "${workdir}/leaf.pub.pem"

              openssl ecparam -name prime256v1 -genkey -noout -out "${workdir}/tmp-leaf.key"
              openssl req -new -key "${workdir}/tmp-leaf.key" -subj "/CN=${LEAF_CN}" -out "${workdir}/leaf.csr"

              openssl ecparam -name prime256v1 -genkey -noout -out "${workdir}/ca.key"
              openssl req -x509 -new -sha256 -key "${workdir}/ca.key" -days "${VALIDITY_DAYS}" -subj "/CN=${CA_CN}" -out "${workdir}/ca.crt"

              cat > "${workdir}/leaf.ext" <<'EOF'
              basicConstraints=critical,CA:FALSE
              keyUsage=critical,digitalSignature
              extendedKeyUsage=emailProtection
              subjectKeyIdentifier=hash
              authorityKeyIdentifier=keyid,issuer
              EOF

              openssl x509 -req \
                -in "${workdir}/leaf.csr" \
                -CA "${workdir}/ca.crt" \
                -CAkey "${workdir}/ca.key" \
                -CAcreateserial \
                -days "${VALIDITY_DAYS}" \
                -sha256 \
                -force_pubkey "${workdir}/leaf.pub.pem" \
                -extfile "${workdir}/leaf.ext" \
                -out "${workdir}/leaf.crt"

              cat "${workdir}/leaf.crt" "${workdir}/ca.crt" > "${workdir}/chain.pem"

              token_path="/var/run/secrets/kubernetes.io/serviceaccount/token"
              ca_path="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              k8s_host="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}"
              sa_token="$(cat "${token_path}")"

              secret_url="${k8s_host}/api/v1/namespaces/${K8S_NAMESPACE}/secrets/${SECRET_NAME}"
              create_url="${k8s_host}/api/v1/namespaces/${K8S_NAMESPACE}/secrets"

              leaf_chain_json="$(jq -Rs . < "${workdir}/chain.pem")"
              ca_cert_json="$(jq -Rs . < "${workdir}/ca.crt")"

              payload="$(cat <<EOF
              {
                "apiVersion": "v1",
                "kind": "Secret",
                "metadata": {
                  "name": "${SECRET_NAME}",
                  "labels": {
                    "app.kubernetes.io/name": "crypto-provider",
                    "app.kubernetes.io/instance": "{{ .Release.Name }}"
                  }
                },
                "type": "Opaque",
                "stringData": {
                  "${SECRET_CHAIN_KEY}": ${leaf_chain_json},
                  "${SECRET_CA_KEY}": ${ca_cert_json}
                }
              }
              EOF
              )"

              status="$(curl -s -o /dev/null -w '%{http_code}' \
                --cacert "${ca_path}" \
                -H "Authorization: Bearer ${sa_token}" \
                "${secret_url}")"

              if [ "${status}" = "200" ] && [ "${OVERWRITE_SECRET}" != "true" ]; then
                echo "Secret ${SECRET_NAME} already exists; keeping existing content (overwrite disabled)."
                exit 0
              fi

              if [ "${status}" = "200" ]; then
                echo "Updating secret ${SECRET_NAME}"
                curl -fsS -X PUT \
                  --cacert "${ca_path}" \
                  -H "Authorization: Bearer ${sa_token}" \
                  -H "Content-Type: application/json" \
                  --data "${payload}" \
                  "${secret_url}" >/dev/null
              else
                echo "Creating secret ${SECRET_NAME}"
                curl -fsS -X POST \
                  --cacert "${ca_path}" \
                  -H "Authorization: Bearer ${sa_token}" \
                  -H "Content-Type: application/json" \
                  --data "${payload}" \
                  "${create_url}" >/dev/null
              fi

              echo "Dev signer certificate chain provisioned in secret '${SECRET_NAME}'."
{{- end }}