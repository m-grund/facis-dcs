# One-shot Job that enables the Vault transit secrets engine and creates the
# DCS C2PA and VC signing keys. Runs once at chart install/upgrade; idempotent.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-vault-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: "{{ .Values.vault.image.repository }}:{{ .Values.vault.image.tag }}"
          imagePullPolicy: {{ .Values.vault.image.pullPolicy }}
          env:
            - name: VAULT_ADDR
              value: "http://{{ .Release.Name }}-crypto-provider-vault:{{ .Values.vault.service.port }}"
            - name: VAULT_TOKEN
              value: {{ .Values.vault.dev.rootToken | quote }}
            - name: TRANSIT_MOUNT
              value: {{ .Values.transit.mount | quote }}
            - name: KEY_NAME
              value: {{ .Values.transit.key | quote }}
            - name: KEY_TYPE
              value: {{ .Values.transit.keyType | quote }}
            - name: VC_KEY_NAME
              value: {{ .Values.transit.vcKey | quote }}
            - name: VC_KEY_TYPE
              value: {{ .Values.transit.vcKeyType | quote }}
            - name: OID4VP_KEY_NAME
              value: {{ .Values.transit.oid4vpVerifierKey | quote }}
            - name: OID4VP_KEY_TYPE
              value: {{ .Values.transit.oid4vpVerifierKeyType | quote }}
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              until vault status > /dev/null 2>&1; do
                echo "Waiting for Vault..."
                sleep 2
              done

              if ! vault secrets list -format=json | grep -q '"'"${TRANSIT_MOUNT}/"'"'; then
                echo "Enabling transit engine at '${TRANSIT_MOUNT}'"
                vault secrets enable -path="${TRANSIT_MOUNT}" transit
              else
                echo "Transit engine at '${TRANSIT_MOUNT}' already enabled."
              fi

              if vault read -format=json "${TRANSIT_MOUNT}/keys/${KEY_NAME}" > /tmp/key.json 2>/dev/null; then
                echo "Key '${KEY_NAME}' already exists."
              else
                echo "Creating key '${KEY_NAME}' (type=${KEY_TYPE})"
                vault write -f "${TRANSIT_MOUNT}/keys/${KEY_NAME}" type="${KEY_TYPE}"
              fi

              if vault read -format=json "${TRANSIT_MOUNT}/keys/${VC_KEY_NAME}" > /tmp/vc-key.json 2>/dev/null; then
                echo "VC key '${VC_KEY_NAME}' already exists."
              else
                echo "Creating VC key '${VC_KEY_NAME}' (type=${VC_KEY_TYPE})"
                vault write -f "${TRANSIT_MOUNT}/keys/${VC_KEY_NAME}" type="${VC_KEY_TYPE}"
              fi

              if vault read -format=json "${TRANSIT_MOUNT}/keys/${OID4VP_KEY_NAME}" > /tmp/oid4vp-key.json 2>/dev/null; then
                echo "OID4VP verifier key '${OID4VP_KEY_NAME}' already exists."
              else
                echo "Creating OID4VP verifier key '${OID4VP_KEY_NAME}' (type=${OID4VP_KEY_TYPE})"
                vault write -f "${TRANSIT_MOUNT}/keys/${OID4VP_KEY_NAME}" type="${OID4VP_KEY_TYPE}"
              fi

              # Verify keys really exist; fail fast if provisioning did not succeed.
              vault read "${TRANSIT_MOUNT}/keys/${KEY_NAME}" >/dev/null
              vault read "${TRANSIT_MOUNT}/keys/${VC_KEY_NAME}" >/dev/null
              vault read "${TRANSIT_MOUNT}/keys/${OID4VP_KEY_NAME}" >/dev/null
              echo "Vault init complete: mount=${TRANSIT_MOUNT} key=${KEY_NAME} type=${KEY_TYPE} vcKey=${VC_KEY_NAME} vcType=${VC_KEY_TYPE} oid4vpKey=${OID4VP_KEY_NAME} oid4vpType=${OID4VP_KEY_TYPE}"
