# HashiCorp Vault backend
vault:
  image:
    repository: hashicorp/vault
    tag: "1.17"
    pullPolicy: IfNotPresent

  # dev mode: auto-unsealed, in-memory storage, single root token.
  # Production deployments should disable dev mode and configure proper
  # Vault auth (AppRole, Kubernetes auth, etc.) via extraEnv.
  dev:
    enabled: true
    # Root token for Vault dev mode. Change in production.
    rootToken: "root"

  service:
    type: ClusterIP
    port: 8200
    nodePort: null

  resources: {}


# Vault transit engine configuration
transit:
  # Mount path for the Vault transit secrets engine.
  # This is sent as CRYPTO_PROVIDER_NAMESPACE to the DCS backend.
  mount: "transit"

  # Name of the signing key to create in the transit engine.
  # This is sent as CRYPTO_PROVIDER_KEY to the DCS backend.
  key: "dcs-signing-key-p256"

  # Key algorithm. Options: ed25519, ecdsa-p256, rsa-2048, rsa-4096
  keyType: "ecdsa-p256"

  # Dedicated VC key used for local Ed25519Signature2020 proofs.
  vcKey: "dcs-vc-signing-key"

  # Key algorithm for the VC proof key.
  vcKeyType: "ed25519"

  # OpenID4VP authorization request JWT signing.
  oid4vpVerifierKey: "dcs-oid4vp-verifier-signing"
  oid4vpVerifierKeyType: "ecdsa-p256"

# Dev-only signer certificate-chain provisioning for C2PA x5chain.
# Generates a local CA and issues a leaf certificate whose public key is the
# transit signing key public key. Stores leaf+CA chain in a Kubernetes Secret.
devCertChain:
  enabled: false
  # Secret holding the generated certificate chain.
  secretName: ""
  # Key in the secret that stores the concatenated PEM chain (leaf first).
  secretKey: "chain.pem"
  # Additional key containing the generated dev CA certificate.
  caCertKey: "ca.pem"
  # Certificate metadata.
  leafCommonName: "dcs-dev-signer"
  caCommonName: "dcs-dev-local-ca"
  validityDays: 3650
  # Rotate and overwrite the secret on each install/upgrade hook run.
  overwrite: true
  # Container image used by the provisioning hook job.
  image:
    repository: alpine
    tag: "3.20"
    pullPolicy: IfNotPresent


# XFSC Crypto Provider Service (signer HTTP API)
signer:
  image:
    repository: node-654e3bca7fbeeed18f81d7c7.ps-xaas.io/tsa/signer
    tag: "v2.1.0"
    pullPolicy: IfNotPresent
  port: 8080
  service:
    type: ClusterIP
    nodePort: null
  resources: {}

# XFSC Vault transit gRPC sidecar
vaultPlugin:
  image:
    repository: node-654e3bca7fbeeed18f81d7c7.ps-xaas.io/tsa/crypto-provider-hashicorp-vault-plugin
    tag: "v2.0.3"
    pullPolicy: IfNotPresent
  grpcPort: 50051
  resources: {}
