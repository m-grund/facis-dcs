replicaCount: 1

image:
  repository: ecofacis/xfsc-orce
  tag: "2.0.13"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 1880
  nodePort: null

ingress:
  enabled: false
  className: ""
  annotations: {}
  pathType: Prefix
  hosts: []
  tls: []

# Persistent storage for Node-RED /data (flows, credentials, settings)
persistence:
  enabled: true
  storageClass: ""
  size: 2Gi
  accessModes:
    - ReadWriteOnce

extraEnv: []

resources: {}
