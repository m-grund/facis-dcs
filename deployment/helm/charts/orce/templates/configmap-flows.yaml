{{- if .Files.Glob "flows/*.json" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-orce-flows
data:
  {{- range $path, $_ := .Files.Glob "flows/*.json" }}
  {{ base $path }}: |
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
{{- end }}{{- if and .Values.flowsFile.enabled (.Files.Glob "flows/*.json") }}
---
# Merged flows rendered at chart level and mounted as Node-RED's flows file
# (deployment.yaml subPath mount at /data/flows.json): every ORCE pod starts
# with the chart's flows already loaded. This replaces the runtime /flows
# import for chart-shipped flows — the import hook raced pod rollouts (it
# could post to the terminating pod; with persistence disabled the fresh pod
# then served no routes at all).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-orce-flows-merged
data:
  flows.json: |
    {{- $merged := list }}
    {{- range $path, $_ := .Files.Glob "flows/*.json" }}
    {{- $merged = concat $merged ($.Files.Get $path | fromJsonArray) }}
    {{- end }}
    {{- $merged | toJson | nindent 4 }}
{{- end }}
