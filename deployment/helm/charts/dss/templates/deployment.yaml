apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dss
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: dss
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dss
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: dss
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The image's entrypoint starts Tomcat in the background then exec's a
          # shell that exits in a detached container, stopping it. Run Tomcat in
          # the foreground so the pod stays up.
          command: ["/dss/apache-tomcat-11.0.4/bin/catalina.sh"]
          args: ["run"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 30
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
