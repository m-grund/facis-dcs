{{- if .Values.clients }}
{{/*
Registers OAuth2 clients in Hydra via the admin API after every install/upgrade.
Idempotent: uses PUT (upsert) so re-running on upgrade is safe.
*/}}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-hydra-clients
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: register-clients
          image: alpine:3.19
          env:
            - name: HYDRA_ADMIN
              value: http://{{ .Release.Name }}-hydra:{{ .Values.service.adminPort }}
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache curl jq >/dev/null 2>&1

              echo "Waiting for Hydra admin API..."
              until curl -sf $HYDRA_ADMIN/health/ready >/dev/null; do sleep 3; done
              echo "Hydra ready."

              {{- range .Values.clients }}
              echo "Registering client {{ .client_id }}..."
              PAYLOAD={{ . | toJson | squote }}
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                $HYDRA_ADMIN/admin/clients/{{ .client_id }})
              if [ "$STATUS" = "200" ]; then
                curl -sf -X PUT $HYDRA_ADMIN/admin/clients/{{ .client_id }} \
                  -H "Content-Type: application/json" -d "$PAYLOAD" >/dev/null
              else
                curl -sf -X POST $HYDRA_ADMIN/admin/clients \
                  -H "Content-Type: application/json" -d "$PAYLOAD" >/dev/null
              fi
              echo "Client {{ .client_id }} done."
              {{- end }}
{{- end }}
