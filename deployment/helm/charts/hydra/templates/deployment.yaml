{{- $issuer := required "hydra.config.selfIssuerURL is required — set it to the externally reachable base URL (e.g. https://dcs.example.com) and route /oauth2 + /.well-known through the ingress" .Values.config.selfIssuerURL -}}
{{- $login := .Values.config.loginURL -}}
{{- $consent := .Values.config.consentURL -}}
{{- $logout := .Values.config.logoutURL -}}
{{- $systemSecret := .Values.secrets.system | default (printf "%s-hydra-system-secret-change-me" .Release.Name) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-hydra
  labels:
    app.kubernetes.io/name: hydra
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hydra
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hydra
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: hydra
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["sh", "-ec"]
          args:
            - |
              set -e
              hydra migrate sql --yes "$DSN"
              exec hydra serve all {{- if .Values.config.dev }} --dev{{- end }}
          env:
            - name: DSN
              value: {{ .Values.config.dsn | quote }}
            - name: SECRETS_SYSTEM
              value: {{ $systemSecret | quote }}
            - name: URLS_SELF_ISSUER
              value: {{ $issuer | quote }}
            - name: URLS_LOGIN
              value: {{ $login | quote }}
            - name: URLS_CONSENT
              value: {{ $consent | quote }}
            {{- if $logout }}
            - name: URLS_LOGOUT
              value: {{ $logout | quote }}
            {{- end }}
            - name: SERVE_PUBLIC_PORT
              value: {{ .Values.service.publicPort | quote }}
            - name: SERVE_ADMIN_PORT
              value: {{ .Values.service.adminPort | quote }}
            - name: SERVE_PUBLIC_TLS_ENABLED
              value: {{ .Values.config.publicTLS | quote }}
            - name: SERVE_ADMIN_TLS_ENABLED
              value: {{ .Values.config.adminTLS | quote }}
            - name: SERVE_TLS_TERMINATION_PROXY
              value: "true"
            # HTTP local dev (config.dev) must not mark cookies Secure — browsers treat
            # localhost as secure, but non-browser clients (testWallet) do not.
            - name: SERVE_COOKIES_SECURE
              value: {{ if .Values.config.dev }}"false"{{ else }}"true"{{ end }}
            - name: SERVE_COOKIES_SAME_SITE_MODE
              value: "Lax"
            # Issue JWT access tokens (default is opaque "ory_at_..." reference tokens).
            # DCS validates access tokens against Hydra's JWKS, which requires JWTs.
            - name: STRATEGIES_ACCESS_TOKEN
              value: "jwt"
          ports:
            - name: public
              containerPort: {{ .Values.service.publicPort }}
            - name: admin
              containerPort: {{ .Values.service.adminPort }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: admin
          livenessProbe:
            httpGet:
              path: /health/alive
              port: admin
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
