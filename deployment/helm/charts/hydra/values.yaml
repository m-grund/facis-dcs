image:
  repository: oryd/hydra
  tag: "v2.2.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  publicPort: 4444
  adminPort: 4445
  publicNodePort: null
  adminNodePort: null

config:
  # For production, use a persistent DSN (for example PostgreSQL).
  dsn: "memory"
  # REQUIRED: public-facing base URL browsers use to reach Hydra (e.g. https://dcs.example.com).
  # Hydra stamps this into every redirect_to URL it returns, so it must be externally reachable.
  # Route Hydra's public paths (/oauth2, /.well-known) through the parent ingress via route.paths.
  selfIssuerURL: ""
  publicIssuerURL: ""
  loginURL: ""
  consentURL: ""
  logoutURL: ""
  publicTLS: false
  adminTLS: false
  # Enable Hydra dev mode (required when selfIssuerURL uses http://).
  # Never set to true in production.
  dev: false

# Paths on the parent chart's ingress to proxy to Hydra's public port.
# The parent ingress must be enabled (ingress.enabled=true) for these to take effect.
route:
  paths:
    - /oauth2
    - /.well-known

secrets:
  # Required for non-dev deployments. Leave empty for generated fallback.
  system: ""

resources: {}
