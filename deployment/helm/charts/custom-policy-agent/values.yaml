replicaCount: 1

image:
  repository: node-654e3bca7fbeeed18f81d7c7.ps-xaas.io/tsa/policy
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  nodePort: null

ingress:
  enabled: false
  className: ""
  annotations: {}
  pathType: Prefix
  hosts: []
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

# MongoDB – MONGO_ADDR is required
mongo:
  addr: ""
  dbname: "policy"
  collection: "policies"
  user: ""
  pass: ""
  authMechanism: "SCRAM-SHA-1"

# NATS – NATS_ADDR is required
nats:
  addr: ""

# OCM – OCM_ADDR is required
# External service addresses (all optional)
externalServices:
  ocmAddr: ""
  cacheAddr: ""
  taskAddr: ""
  didResolverAddr: ""
  signerAddr: ""

# Git-based policy repository (alternative to MongoDB for policy bundles)
policy:
  repositoryCloneURL: ""
  repositoryUser: ""
  repositoryPass: ""
  repositoryBranch: ""
  repositoryFolder: ""
  lockOnValidationFailure: false

# Authentication
auth:
  enabled: false
  jwkURL: ""
  refreshInterval: "1h"

# IP filtering
ipFilter:
  enabled: false
  allowedIPs: ""

# OAuth2 client (for outbound calls)
oauth:
  clientID: ""
  clientSecret: ""
  tokenURL: ""

# HTTP server
http:
  host: ""
  port: 8080
  readTimeout: "10s"
  writeTimeout: "10s"
  idleTimeout: "120s"

logging:
  level: "INFO"

extraEnv: []
extraEnvFrom: []
