apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-custom-policy-agent
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: custom-policy-agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: custom-policy-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: custom-policy-agent
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.http.port | default 8080 }}
              protocol: TCP
            - name: metrics
              containerPort: 2112
              protocol: TCP
          env:
            - name: HTTP_PORT
              value: {{ .Values.http.port | default 8080 | quote }}
            {{- if .Values.http.host }}
            - name: HTTP_HOST
              value: {{ .Values.http.host | quote }}
            {{- end }}
            - name: HTTP_READ_TIMEOUT
              value: {{ .Values.http.readTimeout | default "10s" | quote }}
            - name: HTTP_WRITE_TIMEOUT
              value: {{ .Values.http.writeTimeout | default "10s" | quote }}
            - name: HTTP_IDLE_TIMEOUT
              value: {{ .Values.http.idleTimeout | default "120s" | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logging.level | default "INFO" | quote }}
            {{- if .Values.mongo.addr }}
            - name: MONGO_ADDR
              value: {{ .Values.mongo.addr | quote }}
            {{- end }}
            {{- if .Values.mongo.user }}
            - name: MONGO_USER
              value: {{ .Values.mongo.user | quote }}
            {{- end }}
            {{- if .Values.mongo.pass }}
            - name: MONGO_PASS
              value: {{ .Values.mongo.pass | quote }}
            {{- end }}
            - name: MONGO_DBNAME
              value: {{ .Values.mongo.dbname | default "policy" | quote }}
            - name: MONGO_COLLECTION
              value: {{ .Values.mongo.collection | default "policies" | quote }}
            {{- if .Values.mongo.authMechanism }}
            - name: MONGO_AUTH_MECHANISM
              value: {{ .Values.mongo.authMechanism | quote }}
            {{- end }}
            {{- if .Values.nats.addr }}
            - name: NATS_ADDR
              value: {{ .Values.nats.addr | quote }}
            {{- end }}
            {{- if .Values.externalServices.ocmAddr }}
            - name: OCM_ADDR
              value: {{ .Values.externalServices.ocmAddr | quote }}
            {{- end }}
            {{- if .Values.externalServices.cacheAddr }}
            - name: CACHE_ADDR
              value: {{ .Values.externalServices.cacheAddr | quote }}
            {{- end }}
            {{- if .Values.externalServices.taskAddr }}
            - name: TASK_ADDR
              value: {{ .Values.externalServices.taskAddr | quote }}
            {{- end }}
            {{- if .Values.externalServices.didResolverAddr }}
            - name: DID_RESOLVER_ADDR
              value: {{ .Values.externalServices.didResolverAddr | quote }}
            {{- end }}
            {{- if .Values.externalServices.signerAddr }}
            - name: SIGNER_ADDR
              value: {{ .Values.externalServices.signerAddr | quote }}
            {{- end }}
            - name: AUTH_ENABLED
              value: {{ .Values.auth.enabled | default false | quote }}
            {{- if .Values.auth.jwkURL }}
            - name: AUTH_JWK_URL
              value: {{ .Values.auth.jwkURL | quote }}
            {{- end }}
            - name: AUTH_REFRESH_INTERVAL
              value: {{ .Values.auth.refreshInterval | default "1h" | quote }}
            - name: IP_FILTER_ENABLE
              value: {{ .Values.ipFilter.enabled | default false | quote }}
            {{- if .Values.ipFilter.allowedIPs }}
            - name: IP_FILTER_ALLOWED_IPS
              value: {{ .Values.ipFilter.allowedIPs | quote }}
            {{- end }}
            {{- if .Values.oauth.clientID }}
            - name: OAUTH_CLIENT_ID
              value: {{ .Values.oauth.clientID | quote }}
            {{- end }}
            {{- if .Values.oauth.clientSecret }}
            - name: OAUTH_CLIENT_SECRET
              value: {{ .Values.oauth.clientSecret | quote }}
            {{- end }}
            {{- if .Values.oauth.tokenURL }}
            - name: OAUTH_TOKEN_URL
              value: {{ .Values.oauth.tokenURL | quote }}
            {{- end }}
            {{- if .Values.policy.repositoryCloneURL }}
            - name: POLICY_REPOSITORY_CLONE_URL
              value: {{ .Values.policy.repositoryCloneURL | quote }}
            {{- end }}
            {{- if .Values.policy.repositoryUser }}
            - name: POLICY_REPOSITORY_USER
              value: {{ .Values.policy.repositoryUser | quote }}
            {{- end }}
            {{- if .Values.policy.repositoryPass }}
            - name: POLICY_REPOSITORY_PASS
              value: {{ .Values.policy.repositoryPass | quote }}
            {{- end }}
            {{- if .Values.policy.repositoryBranch }}
            - name: POLICY_REPOSITORY_BRANCH
              value: {{ .Values.policy.repositoryBranch | quote }}
            {{- end }}
            {{- if .Values.policy.repositoryFolder }}
            - name: POLICY_REPOSITORY_FOLDER
              value: {{ .Values.policy.repositoryFolder | quote }}
            {{- end }}
            - name: POLICY_LOCK_ON_VALIDATION_FAILURE
              value: {{ .Values.policy.lockOnValidationFailure | default false | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
