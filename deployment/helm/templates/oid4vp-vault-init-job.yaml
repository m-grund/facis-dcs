{{- if and .Values.vault.enabled .Values.oid4vp.trust.enabled }}
{{/*
Provision demo OID4VP material in Vault KV and sync to Kubernetes:
  - ConfigMap: oid4vp trust.json (public JWKS for DCS backend)
  - Secret: dcs-demo-wallet (issuer-dev.jwk + wallet.jwk for testWallet/demo)
Pattern adapted from DCS-oidc-without-sd-verifier vault-init-job.
*/}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}-oid4vp-vault-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}-oid4vp-vault-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}-oid4vp-vault-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "digital-contracting-service.fullname" . }}-oid4vp-vault-init
subjects:
  - kind: ServiceAccount
    name: {{ include "digital-contracting-service.fullname" . }}-oid4vp-vault-init
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}-oid4vp-vault-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-9"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  generate_dev_keys.py: |
{{ .Files.Get "files/scripts/generate_dev_keys.py" | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}-oid4vp-vault-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      serviceAccountName: {{ include "digital-contracting-service.fullname" . }}-oid4vp-vault-init
      restartPolicy: OnFailure
      containers:
        - name: oid4vp-vault-init
          image: python:3.12-slim
          env:
            - name: VAULT_ADDR
              value: http://{{ .Release.Name }}-vault:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault
                  key: token
            - name: ISSUER_DID
              value: {{ .Values.oid4vp.trust.issuerDID | quote }}
            - name: TRUST_CONFIGMAP
              value: {{ include "digital-contracting-service.oid4vpTrustConfigMapName" . | quote }}
            - name: DEMO_WALLET_SECRET
              value: {{ include "digital-contracting-service.demoWalletSecretName" . | quote }}
          command:
            - bash
            - -c
            - |
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq curl jq >/dev/null
              pip install --quiet cryptography

              K8S=https://kubernetes.default.svc
              K8S_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              K8S_CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)

              echo "Waiting for Vault at $VAULT_ADDR..."
              until curl -sf "$VAULT_ADDR/v1/sys/health" >/dev/null; do sleep 2; done

              curl -sf -X POST -H "X-Vault-Token: $VAULT_TOKEN" -H "Content-Type: application/json" \
                -d '{"type":"kv","options":{"version":"2"}}' \
                "$VAULT_ADDR/v1/sys/mounts/secret" >/dev/null 2>&1 || true

              mkdir -p /work/keys /work/credentials /scripts
              cp /config/generate_dev_keys.py /scripts/generate_dev_keys.py

              if ! curl -sf -H "X-Vault-Token: $VAULT_TOKEN" "$VAULT_ADDR/v1/secret/data/dcs/demo/issuer-dev-jwk" >/dev/null; then
                echo "Generating demo OID4VP material..."
                python3 /scripts/generate_dev_keys.py \
                  --issuer-did "$ISSUER_DID" \
                  --keys-dir /work/keys \
                  --trust-path /work/trust.dev.json \
                  --credentials-dir /work/credentials \
                  --regenerate-keys \
                  --yes \
                  --vault-write
              else
                echo "Demo OID4VP material already in Vault."
              fi

              TRUST_JSON=$(curl -sf -H "X-Vault-Token: $VAULT_TOKEN" "$VAULT_ADDR/v1/secret/data/dcs/demo/trust-json" \
                | jq -r '.data.data.value')
              ISSUER_JWK=$(curl -sf -H "X-Vault-Token: $VAULT_TOKEN" "$VAULT_ADDR/v1/secret/data/dcs/demo/issuer-dev-jwk" \
                | jq -r '.data.data.value')
              WALLET_JWK=$(curl -sf -H "X-Vault-Token: $VAULT_TOKEN" "$VAULT_ADDR/v1/secret/data/dcs/demo/wallet-jwk" \
                | jq -r '.data.data.value')

              CM_BODY=$(jq -nc \
                --arg name "$TRUST_CONFIGMAP" \
                --arg ns "$NS" \
                --arg trust "$TRUST_JSON" \
                '{apiVersion:"v1",kind:"ConfigMap",metadata:{name:$name,namespace:$ns},data:{"trust.json":$trust}}')

              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                -H "Authorization: Bearer $K8S_TOKEN" -H "Content-Type: application/json" --cacert "$K8S_CA" \
                "$K8S/api/v1/namespaces/$NS/configmaps/$TRUST_CONFIGMAP" -d "$CM_BODY")
              if [ "$STATUS" = "404" ]; then
                curl -sf -X POST -H "Authorization: Bearer $K8S_TOKEN" -H "Content-Type: application/json" --cacert "$K8S_CA" \
                  "$K8S/api/v1/namespaces/$NS/configmaps" -d "$CM_BODY"
              fi
              echo "Synced trust.json to ConfigMap $TRUST_CONFIGMAP."

              ISSUER_B64=$(printf '%s' "$ISSUER_JWK" | base64 | tr -d '\n')
              WALLET_B64=$(printf '%s' "$WALLET_JWK" | base64 | tr -d '\n')
              SEC_BODY=$(jq -nc \
                --arg name "$DEMO_WALLET_SECRET" \
                --arg ns "$NS" \
                --arg issuer "$ISSUER_B64" \
                --arg wallet "$WALLET_B64" \
                '{apiVersion:"v1",kind:"Secret",metadata:{name:$name,namespace:$ns},type:"Opaque",data:{"issuer-dev.jwk":$issuer,"wallet.jwk":$wallet}}')

              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
                -H "Authorization: Bearer $K8S_TOKEN" -H "Content-Type: application/json" --cacert "$K8S_CA" \
                "$K8S/api/v1/namespaces/$NS/secrets/$DEMO_WALLET_SECRET" -d "$SEC_BODY")
              if [ "$STATUS" = "404" ]; then
                curl -sf -X POST -H "Authorization: Bearer $K8S_TOKEN" -H "Content-Type: application/json" --cacert "$K8S_CA" \
                  "$K8S/api/v1/namespaces/$NS/secrets" -d "$SEC_BODY"
              fi
              echo "Synced demo wallet keys to Secret $DEMO_WALLET_SECRET."
          volumeMounts:
            - name: script
              mountPath: /config
      volumes:
        - name: script
          configMap:
            name: {{ include "digital-contracting-service.fullname" . }}-oid4vp-vault-init
{{- end }}
