{{- if not .Values.pkcs11.pinSecretRef.name }}
# PKCS#11 token PIN (PKCS11_PIN). Auto-created from pkcs11.pin unless an
# existing Secret is supplied via pkcs11.pinSecretRef.name.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "digital-contracting-service.hsmPinSecretName" . }}
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.pkcs11.pinSecretRef.key }}: {{ .Values.pkcs11.pin | quote }}
{{- end }}
