{{- if and .Values.pdfCore.enabled (not .Values.pdfCore.signing.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "digital-contracting-service.pdfCoreSigningSecretName" . }}
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-core
type: Opaque
stringData:
  signer-key-pem: {{ .Values.pdfCore.signing.signerKeyPEM | quote }}
  x5chain-pem: {{ .Values.pdfCore.signing.x5ChainPEM | quote }}
{{- end }}
