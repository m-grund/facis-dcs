{{- if and .Values.pdfCore.enabled (not .Values.pdfCore.signing.existingSecret) (not .Values.pkcs11.provisioning.enabled) }}
{{- if not .Values.pdfCore.signing.signerKeyPEM }}
{{- fail "pdfCore.signing.signerKeyPEM is required when pkcs11.provisioning.enabled=false and pdfCore.signing.existingSecret is unset — no default dev key ships in this chart, supply one via --set-file or a values overlay that is not committed" }}
{{- end }}
{{- if not .Values.pdfCore.signing.x5ChainPEM }}
{{- fail "pdfCore.signing.x5ChainPEM is required when pkcs11.provisioning.enabled=false and pdfCore.signing.existingSecret is unset — no default dev cert chain ships in this chart, supply one via --set-file or a values overlay that is not committed" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "digital-contracting-service.pdfCoreSigningSecretName" . }}
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-core
type: Opaque
stringData:
  signer-key-pem: {{ .Values.pdfCore.signing.signerKeyPEM | quote }}
  x5chain-pem: {{ .Values.pdfCore.signing.x5ChainPEM | quote }}
  pades-x5chain-pem: {{ .Values.pdfCore.signing.padesX5ChainPEM | default .Values.pdfCore.signing.x5ChainPEM | quote }}
{{- end }}
