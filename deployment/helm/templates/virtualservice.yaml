{{- if .Values.istio.enabled -}}
# Istio VirtualService for routing traffic to DCS and co-deployed services.
# Attaches to an externally-managed Gateway (e.g., provisioned via Terraform).
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
spec:
  hosts:
    {{- range .Values.istio.hosts }}
    - {{ . | quote }}
    {{- end }}
  gateways:
    {{- range .Values.istio.gateways }}
    - {{ . | quote }}
    {{- end }}
  http:
    {{- /* Vendored fc-service route when enabled with route.path — service
         name/port are fc-service's own fixed defaults (kept verbatim, not
         release-prefixed — see Chart.yaml's fc-service dependency). */}}
    {{- if and .Values.fcservice.enabled .Values.fcservice.route.path }}
    - name: fc-service
      match:
        - uri:
            prefix: {{ include "digital-contracting-service.fcserviceRoutePath" . }}
      route:
        - destination:
            host: fc-service
            port:
              number: 8081
    {{- end }}
    {{- /* DCS application route */}}
    - name: dcs
      match:
        - uri:
            prefix: {{ include "digital-contracting-service.baseRoutePath" . }}
      route:
        - destination:
            host: {{ include "digital-contracting-service.fullname" . }}
            port:
              number: {{ .Values.service.port | int }}
{{- end }}
