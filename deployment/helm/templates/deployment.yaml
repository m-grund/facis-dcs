apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "digital-contracting-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "digital-contracting-service.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "digital-contracting-service.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.hostNetwork }}
      hostNetwork: true
      dnsPolicy: {{ default "ClusterFirstWithHostNet" .Values.dnsPolicy }}
      {{- end }}
      {{- if .Values.pkcs11.provisioning.enabled }}
      initContainers:
        # Block startup until the provisioning Job (post-install hook) has
        # created the SoftHSM2 token in the shared volume, so the backend never
        # opens the PKCS#11 module before its keys exist.
        - name: wait-for-hsm-token
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              export SOFTHSM2_CONF={{ .Values.pkcs11.provisioning.tokenDir }}/softhsm2.conf
              until softhsm2-util --show-slots 2>/dev/null | grep -q "Label:[[:space:]]*{{ .Values.pkcs11.tokenLabel }}"; do
                echo "Waiting for SoftHSM2 token '{{ .Values.pkcs11.tokenLabel }}'..."
                sleep 3
              done
              echo "SoftHSM2 token '{{ .Values.pkcs11.tokenLabel }}' is ready."
          volumeMounts:
            - name: hsm-token
              mountPath: {{ .Values.pkcs11.provisioning.tokenDir | quote }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- if and .Values.hydra.enabled .Values.hydra.clients }}
            {{- $hydraClient := index .Values.hydra.clients 0 }}
            - name: HYDRA_PUBLIC_ISSUER_URL
              value: {{ include "digital-contracting-service.hydraIssuerURL" . | quote }}
            - name: HYDRA_INTERNAL_ISSUER_URL
              value: {{ include "digital-contracting-service.hydraInternalIssuerURL" . | quote }}
            - name: HYDRA_CLIENT_ID
              value: {{ $hydraClient.client_id | quote }}
            - name: HYDRA_CLIENT_SECRET
              value: {{ $hydraClient.client_secret | quote }}
            - name: HYDRA_REDIRECT_URI
              value: {{ index $hydraClient.redirect_uris 0 | quote }}
            - name: HYDRA_POST_LOGOUT_REDIRECT_URI
              value: {{ index $hydraClient.post_logout_redirect_uris 0 | quote }}
            - name: HYDRA_ADMIN_URL
              value: {{ include "digital-contracting-service.hydraAdminURL" . | quote }}
            {{- end }}
            {{- if include "digital-contracting-service.fcKeycloakRealmURL" . }}
            - name: FC_KEYCLOAK_REALM_URL
              value: {{ include "digital-contracting-service.fcKeycloakRealmURL" . | quote }}
            {{- end }}
            - name: DATABASE_URL
              {{- if .Values.database.secretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretRef.name | quote }}
                  key: {{ .Values.database.secretRef.key | quote }}
              {{- else }}
              value: {{ include "digital-contracting-service.databaseURL" . | quote }}
              {{- end }}
            - name: NATS_URL
              {{- if .Values.messaging.secretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.messaging.secretRef.name | quote }}
                  key: {{ .Values.messaging.secretRef.key | quote }}
              {{- else }}
              value: {{ include "digital-contracting-service.natsURL" . | quote }}
              {{- end }}
            - name: FEDERATED_CATALOGUE_API_URL
              {{- if and .Values.federatedCatalogue.secretRef .Values.federatedCatalogue.secretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.federatedCatalogue.secretRef.name | quote }}
                  key: {{ .Values.federatedCatalogue.secretRef.key | quote }}
              {{- else }}
              value: {{ .Values.federatedCatalogue.apiURL | quote }}
              {{- end }}
            - name: FEDERATED_CATALOGUE_CLIENT_ID
              value: {{ .Values.federatedCatalogue.oauth.clientID | quote }}
            - name: FEDERATED_CATALOGUE_CLIENT_SECRET
              {{- if .Values.federatedCatalogue.oauth.clientSecretSecretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.federatedCatalogue.oauth.clientSecretSecretRef.name | quote }}
                  key: {{ .Values.federatedCatalogue.oauth.clientSecretSecretRef.key | quote }}
              {{- else }}
              value: {{ .Values.federatedCatalogue.oauth.clientSecret | quote }}
              {{- end }}
            - name: DCS_API_PATH
              value: {{ include "digital-contracting-service.apiPath" . | quote }}
            - name: DCS_UI_PATH
              value: {{ include "digital-contracting-service.uiPath" . | quote }}
            {{- if .Values.route.publicBaseURL }}
            - name: DCS_PUBLIC_BASE_URL
              value: {{ .Values.route.publicBaseURL | quote }}
            {{- end }}
            {{- if .Values.oid4vp.trust.enabled }}
            - name: OID4VP_TRUST_DATA_PATH
              value: {{ .Values.oid4vp.trust.dataPath | quote }}
            {{- if .Values.oid4vp.trust.statusListSkipJWSVerify }}
            - name: OID4VP_STATUSLIST_SKIP_JWS_VERIFY
              value: "true"
            {{- end }}
            {{- end }}
            # ---- PKCS#11 signing token (DCS-IR-HI-01) ------------------------------
            # Every private key lives in this PKCS#11 token; there is no software
            # fallback, so a wrong module/token/PIN is fatal at startup. With
            # pkcs11.provisioning.enabled the token is a co-deployed SoftHSM2
            # software token (dev/staging/CI only, never a production HSM).
            - name: PKCS11_MODULE_PATH
              value: {{ .Values.pkcs11.modulePath | quote }}
            - name: PKCS11_TOKEN_LABEL
              value: {{ .Values.pkcs11.tokenLabel | quote }}
            - name: PKCS11_PIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "digital-contracting-service.hsmPinSecretName" . | quote }}
                  key: {{ .Values.pkcs11.pinSecretRef.key | quote }}
            {{- if .Values.pkcs11.provisioning.enabled }}
            - name: SOFTHSM2_CONF
              value: {{ printf "%s/softhsm2.conf" .Values.pkcs11.provisioning.tokenDir | quote }}
            {{- end }}
            - name: ISSUER_DID
              {{- if .Values.signing.issuerDIDSecretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signing.issuerDIDSecretRef.name | quote }}
                  key: {{ .Values.signing.issuerDIDSecretRef.key | quote }}
              {{- else }}
              value: {{ include "digital-contracting-service.issuerDID" . | quote }}
              {{- end }}
            - name: TSA_URL
              value: {{ .Values.signing.tsaURL | quote }}
            # ---- IPFS storage -------------------------------------------------------
            - name: IPFS_TENANT_BASE_URL
              {{- if .Values.ipfs.tenantBaseURLSecretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ipfs.tenantBaseURLSecretRef.name | quote }}
                  key: {{ .Values.ipfs.tenantBaseURLSecretRef.key | quote }}
              {{- else }}
              value: {{ include "digital-contracting-service.ipfsTenantBaseURL" . | quote }}
              {{- end }}
            - name: IPFS_MFS_BASE_URL
              value: {{ include "digital-contracting-service.ipfsMfsBaseURL" . | quote }}
            # ---- Archive notary / ORCE ---------------------------------------------
            {{- $archiveNotaryBaseURL := .Values.archiveNotary.baseURL | default "" }}
            {{- if and (not $archiveNotaryBaseURL) .Values.orce.enabled }}
            {{- $archiveNotaryBaseURL = printf "http://%s-orce:%v" .Release.Name (.Values.orce.service.port | default 1880) }}
            {{- end }}
            {{- $archiveNotaryURL := "" }}
            {{- $archiveAuditLogURL := "" }}
            {{- if $archiveNotaryBaseURL }}
            {{- $archiveNotaryURL = printf "%s%s" $archiveNotaryBaseURL .Values.archiveNotary.notaryPath }}
            {{- $archiveAuditLogURL = printf "%s%s" $archiveNotaryBaseURL .Values.archiveNotary.auditLogPath }}
            {{- end }}
            - name: ORCE_ARCHIVE_NOTARY_URL
              value: {{ $archiveNotaryURL | quote }}
            - name: ORCE_ARCHIVE_AUDIT_LOG_URL
              value: {{ $archiveAuditLogURL | quote }}
            - name: ORCE_ARCHIVE_AUDIT_LOG_BEARER_TOKEN
              {{- if .Values.archiveNotary.auditLogBearerTokenSecretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.archiveNotary.auditLogBearerTokenSecretRef.name | quote }}
                  key: {{ .Values.archiveNotary.auditLogBearerTokenSecretRef.key | quote }}
              {{- else }}
              value: {{ .Values.archiveNotary.auditLogBearerToken | quote }}
              {{- end }}
            # ---- PDF-Core (C2PA PDF compiler/verifier) --------------------------
            - name: PDF_CORE_URL
              value: {{ include "digital-contracting-service.pdfCoreURL" . | quote }}
            - name: PDF_CORE_CONTEXT_IRI
              value: {{ include "digital-contracting-service.pdfCoreContextIRI" . | quote }}
            # ---- Status List Service (DCS-OR-C2PA-005) --------------------------
            {{- $statuslistURL := include "digital-contracting-service.statuslistServiceURL" . }}
            {{- if $statuslistURL }}
            - name: STATUSLIST_SERVICE_URL
              value: {{ $statuslistURL | quote }}
            {{- end }}
            {{- if .Values.statuslistService.tenantID }}
            - name: STATUSLIST_TENANT_ID
              value: {{ .Values.statuslistService.tenantID | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.customCA.enabled .Values.volumeMounts .Values.pkcs11.provisioning.enabled }}
          volumeMounts:
          {{- if .Values.customCA.enabled }}
            - name: custom-ca-certs
              mountPath: /usr/local/share/ca-certificates/custom
              readOnly: true
          {{- end }}
          {{- if .Values.pkcs11.provisioning.enabled }}
            - name: hsm-token
              mountPath: {{ .Values.pkcs11.provisioning.tokenDir | quote }}
          {{- end }}
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
        {{- if .Values.statusListLocalhostProxy.enabled }}
        - name: statuslist-localhost-proxy
          image: "{{ .Values.statusListLocalhostProxy.image.repository }}:{{ .Values.statusListLocalhostProxy.image.tag }}"
          imagePullPolicy: {{ .Values.statusListLocalhostProxy.image.pullPolicy }}
          ports:
            - name: sl-proxy
              containerPort: {{ .Values.statusListLocalhostProxy.listenPort }}
              protocol: TCP
          volumeMounts:
            - name: statuslist-localhost-proxy-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: sl-proxy
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
        {{- end }}
      {{- if or .Values.customCA.enabled .Values.volumes .Values.pkcs11.provisioning.enabled .Values.statusListLocalhostProxy.enabled }}
      volumes:
      {{- if .Values.customCA.enabled }}
        - name: custom-ca-certs
          configMap:
            name: {{ .Values.customCA.configMapName }}
      {{- end }}
      {{- if .Values.pkcs11.provisioning.enabled }}
        - name: hsm-token
          persistentVolumeClaim:
            claimName: {{ include "digital-contracting-service.fullname" . }}-hsm-token
      {{- end }}
      {{- if .Values.statusListLocalhostProxy.enabled }}
        - name: statuslist-localhost-proxy-config
          configMap:
            name: {{ include "digital-contracting-service.fullname" . }}-statuslist-localhost-proxy
      {{- end }}
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
