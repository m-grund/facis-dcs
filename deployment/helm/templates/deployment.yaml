apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "digital-contracting-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "digital-contracting-service.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "digital-contracting-service.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.hostAliases }}
      hostAliases:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- if and .Values.hydra.enabled .Values.hydra.clients }}
            {{- $hydraClient := index .Values.hydra.clients 0 }}
            - name: HYDRA_ISSUER_URL
              value: {{ include "digital-contracting-service.hydraIssuerURL" . | quote }}
            - name: HYDRA_CLIENT_ID
              value: {{ $hydraClient.client_id | quote }}
            - name: HYDRA_CLIENT_SECRET
              value: {{ $hydraClient.client_secret | quote }}
            - name: HYDRA_REDIRECT_URI
              value: {{ index $hydraClient.redirect_uris 0 | quote }}
            - name: HYDRA_POST_LOGOUT_REDIRECT_URI
              value: {{ index $hydraClient.post_logout_redirect_uris 0 | quote }}
            - name: HYDRA_ADMIN_URL
              value: {{ include "digital-contracting-service.hydraAdminURL" . | quote }}
            {{- end }}
            {{- if include "digital-contracting-service.fcKeycloakRealmURL" . }}
            - name: FC_KEYCLOAK_REALM_URL
              value: {{ include "digital-contracting-service.fcKeycloakRealmURL" . | quote }}
            {{- end }}
            - name: DATABASE_URL
              {{- if .Values.database.secretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretRef.name | quote }}
                  key: {{ .Values.database.secretRef.key | quote }}
              {{- else }}
              value: {{ include "digital-contracting-service.databaseURL" . | quote }}
              {{- end }}
            - name: NATS_URL
              {{- if .Values.messaging.secretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.messaging.secretRef.name | quote }}
                  key: {{ .Values.messaging.secretRef.key | quote }}
              {{- else }}
              value: {{ include "digital-contracting-service.natsURL" . | quote }}
              {{- end }}
            - name: FEDERATED_CATALOGUE_API_URL
              {{- if and .Values.federatedCatalogue.secretRef .Values.federatedCatalogue.secretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.federatedCatalogue.secretRef.name | quote }}
                  key: {{ .Values.federatedCatalogue.secretRef.key | quote }}
              {{- else }}
              value: {{ .Values.federatedCatalogue.apiURL | quote }}
              {{- end }}
            - name: FEDERATED_CATALOGUE_CLIENT_ID
              value: {{ .Values.federatedCatalogue.oauth.clientID | quote }}
            - name: FEDERATED_CATALOGUE_CLIENT_SECRET
              {{- if .Values.federatedCatalogue.oauth.clientSecretSecretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.federatedCatalogue.oauth.clientSecretSecretRef.name | quote }}
                  key: {{ .Values.federatedCatalogue.oauth.clientSecretSecretRef.key | quote }}
              {{- else }}
              value: {{ .Values.federatedCatalogue.oauth.clientSecret | quote }}
              {{- end }}
            - name: DCS_API_PATH
              value: {{ include "digital-contracting-service.apiPath" . | quote }}
            - name: DCS_UI_PATH
              value: {{ include "digital-contracting-service.uiPath" . | quote }}
            {{- if .Values.oid4vp.trust.enabled }}
            - name: OID4VP_TRUST_DATA_PATH
              value: {{ .Values.oid4vp.trust.dataPath | quote }}
            {{- if .Values.cryptoProvider.enabled }}
            - name: VAULT_ADDR
              value: {{ include "digital-contracting-service.vaultAddr" . | quote }}
            - name: VAULT_TOKEN
              value: {{ .Values.cryptoProvider.vault.dev.rootToken | quote }}
            - name: OID4VP_VERIFIER_SIGNING_VAULT_MOUNT
              value: {{ .Values.oid4vp.trust.verifierSigningVaultMount | quote }}
            - name: OID4VP_VERIFIER_SIGNING_VAULT_KEY
              value: {{ .Values.oid4vp.trust.verifierSigningVaultKey | quote }}
            {{- end }}
            {{- end }}
            # ---- Signing / C2PA provenance (XFSC Crypto Provider Service) ----------
            - name: CRYPTO_PROVIDER_URL
              {{- if .Values.signing.cryptoProviderURLSecretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signing.cryptoProviderURLSecretRef.name | quote }}
                  key: {{ .Values.signing.cryptoProviderURLSecretRef.key | quote }}
              {{- else }}
              value: {{ include "digital-contracting-service.cryptoProviderURL" . | quote }}
              {{- end }}
            - name: CRYPTO_PROVIDER_NAMESPACE
              value: {{ include "digital-contracting-service.cryptoProviderNamespace" . | quote }}
            - name: CRYPTO_PROVIDER_KEY
              value: {{ include "digital-contracting-service.cryptoProviderKey" . | quote }}
            - name: CRYPTO_PROVIDER_VC_KEY
              value: {{ include "digital-contracting-service.cryptoProviderVCKey" . | quote }}
            - name: CRYPTO_PROVIDER_VC_SIGNATURE_TYPE
              value: {{ .Values.signing.vcSignatureType | quote }}
                {{- $certSecretName := include "digital-contracting-service.signingCertChainSecretName" . }}
                {{- $certChainEnabled := or .Values.signing.certChain.enabled (and .Values.cryptoProvider.enabled .Values.cryptoProvider.devCertChain.enabled) }}
                {{- if and $certChainEnabled $certSecretName }}
            - name: CRYPTO_PROVIDER_CERT_CHAIN_FILE
              value: {{ printf "%s/%s" .Values.signing.certChain.mountPath .Values.signing.certChain.fileName | quote }}
            {{- end }}
            - name: ISSUER_DID
              {{- if .Values.signing.issuerDIDSecretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signing.issuerDIDSecretRef.name | quote }}
                  key: {{ .Values.signing.issuerDIDSecretRef.key | quote }}
              {{- else }}
              value: {{ include "digital-contracting-service.issuerDID" . | quote }}
              {{- end }}
            - name: TSA_URL
              value: {{ .Values.signing.tsaURL | quote }}
            # ---- IPFS storage -------------------------------------------------------
            - name: IPFS_TENANT_BASE_URL
              {{- if .Values.ipfs.tenantBaseURLSecretRef.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ipfs.tenantBaseURLSecretRef.name | quote }}
                  key: {{ .Values.ipfs.tenantBaseURLSecretRef.key | quote }}
              {{- else }}
              value: {{ include "digital-contracting-service.ipfsTenantBaseURL" . | quote }}
              {{- end }}
            - name: IPFS_MFS_BASE_URL
              value: {{ include "digital-contracting-service.ipfsMfsBaseURL" . | quote }}
            - name: STATUSLIST_SERVICE_URL
              value: {{ include "digital-contracting-service.statuslistServiceURL" . | quote }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $certSecretName := include "digital-contracting-service.signingCertChainSecretName" . }}
          {{- $certChainEnabled := or .Values.signing.certChain.enabled (and .Values.cryptoProvider.enabled .Values.cryptoProvider.devCertChain.enabled) }}
          {{- if or .Values.customCA.enabled .Values.volumeMounts (and $certChainEnabled $certSecretName) }}
          volumeMounts:
          {{- if .Values.customCA.enabled }}
            - name: custom-ca-certs
              mountPath: /usr/local/share/ca-certificates/custom
              readOnly: true
          {{- end }}
          {{- if and $certChainEnabled $certSecretName }}
            - name: signer-cert-chain
              mountPath: {{ .Values.signing.certChain.mountPath | quote }}
              readOnly: true
          {{- end }}
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
      {{- $certSecretName := include "digital-contracting-service.signingCertChainSecretName" . }}
      {{- $certChainEnabled := or .Values.signing.certChain.enabled (and .Values.cryptoProvider.enabled .Values.cryptoProvider.devCertChain.enabled) }}
      {{- if or .Values.customCA.enabled .Values.volumes (and $certChainEnabled $certSecretName) }}
      volumes:
      {{- if .Values.customCA.enabled }}
        - name: custom-ca-certs
          configMap:
            name: {{ .Values.customCA.configMapName }}
      {{- end }}
      {{- if and $certChainEnabled $certSecretName }}
        - name: signer-cert-chain
          secret:
            secretName: {{ $certSecretName | quote }}
            items:
              - key: {{ include "digital-contracting-service.signingCertChainSecretKey" . | quote }}
                path: {{ .Values.signing.certChain.fileName | quote }}
      {{- end }}
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
