{{- if .Values.pkcs11.provisioning.enabled }}
# Provisions the co-deployed SoftHSM2 software token (dev/staging/CI only, never
# a production HSM): initializes the token, generates the five DCS ECDSA P-256
# keys, and issues the C2PA x5chain bound to the dcs-c2pa token key, published as
# a Secret that pdf-core mounts (pdf-core signs COSE bytes via the backend's
# PKCS#11 key and only needs the public x5chain, DCS-IR-HI-01). Idempotent; runs
# on every install/upgrade after the token PVC exists.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}-hsm-provision
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}-hsm-provision
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}-hsm-provision
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ include "digital-contracting-service.fullname" . }}-hsm-provision
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "digital-contracting-service.fullname" . }}-hsm-provision
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}-hsm-provision
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "digital-contracting-service.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hsm-provision
    spec:
      serviceAccountName: {{ include "digital-contracting-service.fullname" . }}-hsm-provision
      restartPolicy: OnFailure
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: hsm-provision
          image: "{{ .Values.pkcs11.provisioning.image.repository | default .Values.image.repository }}:{{ .Values.pkcs11.provisioning.image.tag | default .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.pkcs11.provisioning.image.pullPolicy | default .Values.image.pullPolicy }}
          # Runs as root to write into the freshly-provisioned volume; the token
          # dir is chmod'd afterwards so the non-root backend can open it.
          securityContext:
            runAsUser: 0
          env:
            - name: PKCS11_PIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "digital-contracting-service.hsmPinSecretName" . | quote }}
                  key: {{ .Values.pkcs11.pinSecretRef.key | quote }}
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          command:
            - /bin/bash
            - -c
            - |
              set -eu
              TOKEN_DIR={{ .Values.pkcs11.provisioning.tokenDir | quote }}
              LABEL={{ .Values.pkcs11.tokenLabel | quote }}
              MODULE={{ .Values.pkcs11.modulePath | quote }}
              SO_PIN={{ .Values.pkcs11.provisioning.soPin | quote }}
              SECRET_NAME={{ include "digital-contracting-service.hsmX5ChainSecretName" . | quote }}
              CRL_URL={{ printf "http://%s:%v%s/crl/dcs-c2pa.crl" (include "digital-contracting-service.fullname" .) .Values.service.port (include "digital-contracting-service.apiPath" .) | quote }}

              /app/scripts/hsm-provision.sh "$TOKEN_DIR" "$LABEL" "$PKCS11_PIN" "$SO_PIN" "$MODULE"

              # Store the x5chain + its dev CA inside the token dir so the CA
              # stays a stable trust anchor across upgrades.
              /app/scripts/c2pa-cert-provision.sh "$TOKEN_DIR" "$LABEL" "$PKCS11_PIN" \
                "$TOKEN_DIR/c2pa-x5chain.pem" "$MODULE" "$CRL_URL"

              # Let the non-root backend container read/write the token.
              chmod -R a+rwX "$TOKEN_DIR"

              # Publish the x5chain as a Secret for pdf-core via the K8s API.
              k8s_host="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS}"
              ca_path="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              sa_token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
              {{- if .Values.pkcs11.provisioning.didDocument.enabled }}
              {{- if not .Values.pkcs11.provisioning.didDocument.did }}
              {{- fail "pkcs11.provisioning.didDocument.did is required when didDocument.enabled" }}
              {{- end }}

              # Regenerate did.json from the token's dcs-did key so the DID doc
              # always matches the freshly provisioned key (main.go fatals on
              # mismatch). Published as a Secret the deployment mounts.
              export SOFTHSM2_CONF="$TOKEN_DIR/softhsm2.conf"
              export PKCS11_MODULE_PATH="$MODULE"
              export PKCS11_TOKEN_LABEL="$LABEL"
              /app/gendid -out /tmp/did.json \
                -did {{ .Values.pkcs11.provisioning.didDocument.did | quote }} \
                {{- if .Values.pkcs11.provisioning.didDocument.serviceEndpoint }}
                -endpoint {{ .Values.pkcs11.provisioning.didDocument.serviceEndpoint | quote }} \
                {{- end }}

              DID_SECRET_NAME={{ .Values.pkcs11.provisioning.didDocument.secretName | quote }}
              did_json="$(jq -Rs . < /tmp/did.json)"
              did_payload="$(cat <<EOF
              {
                "apiVersion": "v1",
                "kind": "Secret",
                "metadata": { "name": "${DID_SECRET_NAME}" },
                "type": "Opaque",
                "stringData": { "did.json": ${did_json} }
              }
              EOF
              )"
              did_secret_url="${k8s_host}/api/v1/namespaces/${K8S_NAMESPACE}/secrets/${DID_SECRET_NAME}"
              status="$(curl -s -o /dev/null -w '%{http_code}' \
                --cacert "$ca_path" -H "Authorization: Bearer ${sa_token}" "$did_secret_url")"
              if [ "$status" = "200" ]; then
                curl -fsS -X PUT --cacert "$ca_path" \
                  -H "Authorization: Bearer ${sa_token}" -H "Content-Type: application/json" \
                  --data "$did_payload" "$did_secret_url" >/dev/null
                echo "Updated DID document secret ${DID_SECRET_NAME}."
              else
                curl -fsS -X POST --cacert "$ca_path" \
                  -H "Authorization: Bearer ${sa_token}" -H "Content-Type: application/json" \
                  --data "$did_payload" "${k8s_host}/api/v1/namespaces/${K8S_NAMESPACE}/secrets" >/dev/null
                echo "Created DID document secret ${DID_SECRET_NAME}."
              fi
              {{- end }}
              secret_url="${k8s_host}/api/v1/namespaces/${K8S_NAMESPACE}/secrets/${SECRET_NAME}"
              create_url="${k8s_host}/api/v1/namespaces/${K8S_NAMESPACE}/secrets"
              x5chain_json="$(jq -Rs . < "$TOKEN_DIR/c2pa-x5chain.pem")"
              payload="$(cat <<EOF
              {
                "apiVersion": "v1",
                "kind": "Secret",
                "metadata": { "name": "${SECRET_NAME}" },
                "type": "Opaque",
                "stringData": { "x5chain-pem": ${x5chain_json} }
              }
              EOF
              )"
              status="$(curl -s -o /dev/null -w '%{http_code}' \
                --cacert "$ca_path" -H "Authorization: Bearer ${sa_token}" "$secret_url")"
              if [ "$status" = "200" ]; then
                curl -fsS -X PUT --cacert "$ca_path" \
                  -H "Authorization: Bearer ${sa_token}" -H "Content-Type: application/json" \
                  --data "$payload" "$secret_url" >/dev/null
                echo "Updated x5chain secret ${SECRET_NAME}."
              else
                curl -fsS -X POST --cacert "$ca_path" \
                  -H "Authorization: Bearer ${sa_token}" -H "Content-Type: application/json" \
                  --data "$payload" "$create_url" >/dev/null
                echo "Created x5chain secret ${SECRET_NAME}."
              fi
          volumeMounts:
            - name: hsm-token
              mountPath: {{ .Values.pkcs11.provisioning.tokenDir | quote }}
      volumes:
        - name: hsm-token
          persistentVolumeClaim:
            claimName: {{ include "digital-contracting-service.fullname" . }}-hsm-token
{{- end }}
