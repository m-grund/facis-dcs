{{- if .Values.pdfCore.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}-pdf-core
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-core
spec:
  replicas: {{ .Values.pdfCore.replicaCount }}
  selector:
    matchLabels:
      {{- include "digital-contracting-service.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pdf-core
  template:
    metadata:
      labels:
        {{- include "digital-contracting-service.labels" . | nindent 8 }}
        app.kubernetes.io/component: pdf-core
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pdf-core
          image: "{{ .Values.pdfCore.image.repository }}:{{ .Values.pdfCore.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.pdfCore.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.pdfCore.service.port }}
              protocol: TCP
          env:
            - name: DCS_PDF_CORE_ADDR
              value: {{ printf "0.0.0.0:%v" .Values.pdfCore.service.port | quote }}
            - name: DCS_PDF_CORE_C2PA_SIGNER_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ include "digital-contracting-service.pdfCoreSigningSecretName" . }}
                  key: {{ .Values.pdfCore.signing.existingSecretSignerKeyKey | default "signer-key-pem" | quote }}
            - name: DCS_PDF_CORE_C2PA_X5CHAIN_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ include "digital-contracting-service.pdfCoreSigningSecretName" . }}
                  key: {{ .Values.pdfCore.signing.existingSecretX5ChainKey | default "x5chain-pem" | quote }}
          readinessProbe:
            httpGet:
              path: /swagger.json
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /swagger.json
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
{{- end }}
