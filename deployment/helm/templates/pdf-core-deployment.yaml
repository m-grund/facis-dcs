{{- if .Values.pdfCore.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "digital-contracting-service.fullname" . }}-pdf-core
  labels:
    {{- include "digital-contracting-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-core
spec:
  replicas: {{ .Values.pdfCore.replicaCount }}
  selector:
    matchLabels:
      {{- include "digital-contracting-service.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pdf-core
  template:
    metadata:
      labels:
        {{- include "digital-contracting-service.labels" . | nindent 8 }}
        app.kubernetes.io/component: pdf-core
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        # Block startup until the hsm-provision post-install hook has published
        # the C2PA x5chain cert secret. pdf-core embeds this cert in the COSE
        # protected header, so it must never start without it — but the env
        # secretKeyRef alone CreateContainerConfigError/BackOff crash-looped the
        # pod while it raced the hook, and under runner load that churn closed
        # peer browser sessions mid-negotiation. Waiting here (like the backend's
        # wait-for-hsm-token) turns the race into a clean Init wait. Uses the
        # backend image for a shell; the cert is read via an optional volume.
        - name: wait-for-x5chain
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              until [ -s /x5chain/{{ include "digital-contracting-service.pdfCoreX5ChainSecretKey" . }} ]; do
                echo "Waiting for C2PA x5chain cert secret..."
                sleep 3
              done
              echo "C2PA x5chain cert is ready."
          volumeMounts:
            - name: x5chain-cert
              mountPath: /x5chain
      containers:
        - name: pdf-core
          image: "{{ .Values.pdfCore.image.repository }}:{{ .Values.pdfCore.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.pdfCore.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.pdfCore.service.port }}
              protocol: TCP
          env:
            - name: DCS_PDF_CORE_ADDR
              value: {{ printf "0.0.0.0:%v" .Values.pdfCore.service.port | quote }}
            - name: DCS_PDF_CORE_ONTOLOGY_BASE_URL
              value: {{ .Values.pdfCore.ontologyBaseURL | default (include "digital-contracting-service.pdfCoreURL" .) | quote }}
            # pdf-core holds no key material: it prepares the COSE Sig_structures,
            # the DCS backend signs them with the PKCS#11 dcs-c2pa key, and pdf-core
            # embeds the returned signatures (DCS-IR-HI-01). It embeds this x5chain
            # (public cert) in the COSE protected header. optional so the pod
            # schedules; the wait-for-x5chain initContainer guarantees the secret
            # exists before this container starts, so the ref always resolves.
            - name: DCS_PDF_CORE_C2PA_X5CHAIN_PEM
              valueFrom:
                secretKeyRef:
                  name: {{ include "digital-contracting-service.pdfCoreX5ChainSecretName" . }}
                  key: {{ include "digital-contracting-service.pdfCoreX5ChainSecretKey" . | quote }}
                  optional: true
          readinessProbe:
            httpGet:
              path: /swagger.json
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /swagger.json
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: x5chain-cert
          secret:
            secretName: {{ include "digital-contracting-service.pdfCoreX5ChainSecretName" . }}
            optional: true
{{- end }}
