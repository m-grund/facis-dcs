# Dev values: co-deploy all dependencies, skip the DCS app itself.
# Run the backend locally with `air` and the frontend with `vite`.
#
# First-time setup (packages local subcharts):
#   helm dependency update ./deployment/helm
#
# Install:
#   helm install dcs ./deployment/helm -f ./deployment/helm/values.dev.yml
#
# Upgrade (after chart changes):
#   helm dependency update ./deployment/helm  # re-run if Chart.yaml changed
#   helm upgrade dcs ./deployment/helm -f ./deployment/helm/values.dev.yml
#
# Services exposed on localhost via NodePort (Rancher Desktop forwards these automatically):
#   PostgreSQL       : localhost:31513
#   Keycloak         : localhost:30010  →  realm: http://localhost:30010/realms/gaia-x
#   Hydra public : localhost:30555  (backend + Vite proxy only — browser goes via Vite)
#   Hydra admin  : localhost:31285
#   NATS             : localhost:30122
#   Neo4j HTTP       : localhost:31373
#   Neo4j Bolt       : localhost:32287
#   FC service       : localhost:31081
#   ORCE             : localhost:31188
#   Status List Service : localhost:30221  (XFSC status list management)
#   IPFS Gateway: localhost:31486
#   IPFS API    : localhost:31512
#
# Backend .env.dev2 (see that file for the full set):
#   STATUSLIST_SERVICE_URL=http://localhost:30221
#   OID4VP_XFSC_ALLOW_UNSIGNED_FALLBACK=true
#   ISSUER_DID=did:web:localhost%3A8992
# The backend runs natively and provisions its own SoftHSM2 token via
# dev-stack2.sh (scripts/hsm-provision.sh), so no in-cluster PKCS#11 token here.

# In development, don't deploy the DCS or pdf-core containers — both run locally.
replicaCount: 0

# pdf-core runs locally (started by dev-stack.sh), not as a K8s pod.
pdfCore:
  enabled: false

# The backend runs natively (replicaCount: 0), so no in-cluster SoftHSM2 token
# is provisioned; dev-stack2.sh provisions the local token instead.
pkcs11:
  provisioning:
    enabled: false

# No private registry needed for local dev (all dep images are public)
imagePullSecrets: []
dockerRegistry:
  create: false

postgresql:
  enabled: true
  auth:
    username: dcs
    password: dcs
    database: dcs
  additionalDatabases: ["fc", "statuslist", "hydra"]
  persistence:
    enabled: false
  service:
    type: NodePort
    nodePort: 31513

keycloak:
  enabled: true
  service:
    type: NodePort
    port: 8080
    nodePort: 30010
  auth:
    adminUser: admin
    adminPassword: admin
  realm:
    import: true
  extraEnv:
    - name: KC_HOSTNAME
      value: "localhost"
    - name: KC_HOSTNAME_PORT
      value: "30010"
    - name: KC_HOSTNAME_STRICT_HTTPS
      value: "false"
    - name: KC_HTTP_ENABLED
      value: "true"

hydra:
  enabled: true
  service:
    type: NodePort
    publicPort: 4444
    adminPort: 4445
    publicNodePort: 30555
    adminNodePort: 31285
  config:
    dsn: "postgres://dcs:dcs@dcs2-postgresql:5432/hydra?sslmode=disable"
    dev: true
    selfIssuerURL: "http://localhost:5174"
    loginURL: "http://localhost:5174/ui/"
    consentURL: "http://localhost:5174/api/auth/consent"
    logoutURL: "http://localhost:5174/api/auth/logout-complete"
  secrets:
    system: "dev-hydra-system-secret-change-me"
  clients:
    - client_id: dcs-client
      client_secret: dcs-secret
      grant_types: ["authorization_code", "refresh_token"]
      response_types: ["code"]
      scope: "openid offline_access"
      redirect_uris: ["http://localhost:5174/api/auth/callback"]
      post_logout_redirect_uris: ["http://localhost:5174/api/auth/logout-complete"]
      token_endpoint_auth_method: client_secret_post
      skip_consent: true

nats:
  enabled: true
  service:
    type: NodePort
    nodePort: 30122

neo4j:
  enabled: true
  persistence:
    enabled: false
  service:
    type: NodePort
    nodePortHttp: 31373
    nodePortBolt: 32287

# XFSC Federated Catalogue (requires neo4j, keycloak, postgresql with "fc" database)
# See charts/federated-catalogue/values.yaml for all configurable fields.
federatedCatalogue:
  enabled: true
  service:
    type: NodePort
    nodePort: 31081
  keycloak:
    hostname: "localhost:30010"
    issuerScheme: "http"
  oauth:
    clientID: "dcs-fc-client"
  # Allow POSTing self-descriptions without signature verification in dev
  verificationVpSignature: false
  verificationVcSignature: false

fcKeycloak:
  realmURL: "http://localhost:30010/realms/gaia-x"
# Not used when replicaCount=0, but kept as documentation for the backend .env.
signing:
  issuerDID: "did:web:localhost"

oidc:
  clientID: "dcs-client"
  redirectURI: "http://localhost:5174/api/auth/callback"
  logoutRedirectURI: "http://localhost:5174/api/auth/logout-complete"
  realm: "gaia-x"
  keycloakScheme: "http"

# XFSC Status List Service (DCS-OR-C2PA-005)
statuslistService:
  enabled: true
  service:
    type: NodePort
    port: 8080
    nodePort: 30221
  keycloak:
    hostname: "localhost:30010"
    issuerScheme: "http"
  oauth:
    clientID: "dcs-fc-client"
  # Allow POSTing self-descriptions without signature verification in dev
  verificationVpSignature: false
  verificationVcSignature: false
  database:
    enabled: true
    host: "dcs2-postgresql"
    port: "5432"
    name: "statuslist"
    user: "dcs"
    password: "dcs"
    sslMode: "disable"
  nats:
    url: "nats://dcs2-nats:4222"

orce:
  enabled: true
  persistence:
    enabled: false
  service:
    type: NodePort
    nodePort: 31188

ipfs:
  enabled: true
  persistence:
    enabled: true
  api:
    cors:
      enabled: true
      allowOrigins:
        - "http://localhost:31486"
        - "http://127.0.0.1:31486"
        - "http://localhost:31512"
        - "http://127.0.0.1:31512"
        - "http://webui.ipfs.io"
        - "https://webui.ipfs.io"
  service:
    type: NodePort
    gatewayNodePort: 31486
    apiNodePort: 31512

ipfsDocumentManager:
  enabled: true
  service:
    type: NodePort
    nodePort: 30486
  ipfs:
    host: "dcs2-ipfs"
    apiGatewayURL: "http://dcs2-ipfs:8080/ipfs"
    rpcApiPort: 5001
    logLevel: "debug"
  config:
    serverMode: "debug"

# IPFS client env vars are not used when replicaCount=0 (backend runs locally).
# For local dev, set in backend/.env.dev:
#   IPFS_TENANT_BASE_URL=
#   IPFS_MFS_BASE_URL=http://localhost:31512
# In-cluster, IPFS_MFS_BASE_URL is auto-wired from the ipfs sub-chart. If
# ipfsDocumentManager is enabled with a valid image, IPFS_TENANT_BASE_URL is
# auto-wired to the document-manager service.

route:
  basePath: "/api"
