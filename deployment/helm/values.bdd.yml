# BDD test values: used by tests/bdd/Makefile kind_deploy target (kind cluster).
# Assumes release name "dcs" (HELM_RELEASE default in the Makefile).
extraEnv:
  - name: JWT_ALG_NONE_SUPPORTED
    value: "true"

postgresql:
  enabled: true
  additionalDatabases: ["hydra"]

nats:
  enabled: true

hydra:
  enabled: true
  config:
    dsn: "postgres://dcs:dcs@dcs-postgresql:5432/hydra?sslmode=disable"
    dev: true
    selfIssuerURL: "http://dcs-hydra:4444"
    loginURL: "http://127.0.0.1/digital-contracting-service/ui/"
    consentURL: "http://127.0.0.1/digital-contracting-service/api/auth/consent"
    logoutURL: "http://127.0.0.1/digital-contracting-service/api/auth/logout-complete"
  secrets:
    system: "bdd-hydra-system-secret-change-me"
  clients:
    - client_id: dcs-client
      client_secret: dcs-secret
      grant_types: ["authorization_code", "refresh_token"]
      response_types: ["code"]
      scope: "openid offline_access"
      redirect_uris: ["http://127.0.0.1/digital-contracting-service/api/auth/callback"]
      post_logout_redirect_uris: ["http://127.0.0.1/digital-contracting-service/api/auth/logout-complete"]
      token_endpoint_auth_method: client_secret_post
      skip_consent: true

route:
  basePath: "/digital-contracting-service"

monitoring:
  enabled: true

grafana:
  enabled: true

prometheus:
  enabled: true

alertmanager:
  enabled: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
