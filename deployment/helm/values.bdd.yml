# BDD test values: used by tests/bdd/Makefile kind_deploy target (kind cluster).
# Assumes release name "dcs" (HELM_RELEASE default in the Makefile).
#
# Image is loaded into kind via 'kind load docker-image' before helm deploy,
# so Never prevents spurious registry pulls.
traefik:
  enabled: true
  fullnameOverride: traefik
  namespaceOverride: kube-system
  ingressClass:
    enabled: true
    isDefaultClass: true
  providers:
    kubernetesIngress:
      enabled: true
      allowEmptyServices: true
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  ports:
    web:
      port: 18080
      exposedPort: 18080
      hostPort: 18080

image:
  pullPolicy: Never

pdfCore:
  enabled: true
  image:
    repository: pdf-core
    tag: bdd
    pullPolicy: Never

extraEnv:
  - name: JWT_ALG_NONE_SUPPORTED
    value: "true"
  - name: AUTH_INSECURE_COOKIES
    value: "true"
  # DID identity (fatal on startup when missing). The dcs-identity secret is
  # published by the hsm-provision post-install/post-upgrade hook job,
  # generated from the freshly provisioned in-cluster HSM token key.
  - name: DCS_DID
    value: /app/identity/did.json

volumeMounts:
  - name: identity
    mountPath: /app/identity
    readOnly: true

volumes:
  - name: identity
    secret:
      secretName: dcs-identity

oid4vp:
  trust:
    statusListSkipJWSVerify: true

postgresql:
  enabled: true
  auth:
    username: dcs
    password: dcs
    database: dcs
  additionalDatabases: ["fc", "hydra", "statuslist"]
  persistence:
    enabled: false

keycloak:
  enabled: true
  service:
    type: ClusterIP
    port: 8080
  auth:
    adminUser: admin
    adminPassword: admin
  realm:
    import: true
  extraEnv:
    - name: KC_HOSTNAME
      value: "dcs-keycloak"
    - name: KC_HOSTNAME_PORT
      value: "8080"
    - name: KC_HOSTNAME_STRICT_HTTPS
      value: "false"
    - name: KC_HTTP_ENABLED
      value: "true"

nats:
  enabled: true

neo4j:
  enabled: true
  persistence:
    enabled: false

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: localhost
      paths:
        # Default base route (what the no-paths default would render) ...
        - path: /digital-contracting-service
          pathType: Prefix
        # ... plus the domain-level DID document: backend/design/did.go mounts
        # /.well-known/did.json on the root mux (did:web semantics), outside
        # DCS_API_PATH, so the BDD harness needs it routed at the origin root.
        # Full path (not /.well-known): hydra.route.paths already claims the
        # /.well-known prefix for OIDC discovery, and the longer path wins.
        - path: /.well-known/did.json
          pathType: Prefix

hydra:
  enabled: true
  config:
    dsn: "postgres://dcs:dcs@dcs-postgresql:5432/hydra?sslmode=disable"
    dev: true
    selfIssuerURL: "http://localhost:18080"
    loginURL: "http://localhost:18080/digital-contracting-service/ui/"
    consentURL: "http://localhost:18080/digital-contracting-service/api/auth/consent"
    logoutURL: "http://localhost:18080/digital-contracting-service/api/auth/logout-complete"
  secrets:
    system: "bdd-hydra-system-secret-change-me"
  clients:
    - client_id: dcs-client
      client_secret: dcs-secret
      grant_types: ["authorization_code", "refresh_token"]
      response_types: ["code"]
      scope: "openid offline_access"
      redirect_uris: ["http://localhost:18080/digital-contracting-service/api/auth/callback"]
      post_logout_redirect_uris: ["http://localhost:18080/digital-contracting-service/api/auth/logout-complete"]
      token_endpoint_auth_method: client_secret_post
      skip_consent: true

federatedCatalogue:
  enabled: true
  apiURL: "http://dcs-federated-catalogue:8081"
  oauth:
    clientID: "dcs-fc-client"
    clientSecret: "dcs-fc-client-secret"
  keycloak:
    hostname: "dcs-keycloak:8080"
    issuerScheme: "http"
  verificationVpSignature: false
  verificationVcSignature: false

fcKeycloak:
  realmURL: "http://dcs-keycloak:8080/realms/gaia-x"

# SoftHSM2 software token holding every private key (DCS-IR-HI-01), provisioned
# in-cluster with all five ECDSA P-256 keys and the C2PA x5chain. hsm.Open is
# fatal on startup, so the backend waits for the provisioning job's token via an
# initContainer. SoftHSM2 is a software token for CI only, never a production HSM.
pkcs11:
  tokenLabel: dcs
  pin: "1234"
  provisioning:
    enabled: true
    soPin: "12345678"

# XFSC Status List Service: required (fatal on startup if STATUSLIST_SERVICE_URL unreachable).
statuslistService:
  enabled: true
  tenantID: c2pa
  ingress:
    enabled: true
    className: traefik
    stripPrefix: /statuslist
    hosts:
      - host: localhost
        paths:
          - path: /statuslist
            pathType: Prefix
  database:
    enabled: true
    host: "dcs-postgresql"
    port: "5432"
    name: "statuslist"
    user: "dcs"
    password: "dcs"
    sslMode: "disable"
  nats:
    url: "nats://dcs-nats:4222"
  bddListInit:
    enabled: true
    tenantIDs:
      - credential
      - c2pa

statusListLocalhostProxy:
  enabled: true
  upstream: "http://traefik.kube-system.svc.cluster.local:18080"
  ingressHost: localhost

# IPFS: required — IPFS_TENANT_BASE_URL and IPFS_MFS_BASE_URL are fatal on startup.
ipfs:
  enabled: true
  persistence:
    enabled: false

ipfsDocumentManager:
  enabled: true
  ipfs:
    host: "dcs-ipfs"
    apiGatewayURL: "http://dcs-ipfs:8080/ipfs"
    rpcApiPort: 5001
  config:
    serverMode: "debug"

# ORCE (Timestamp Authority): required — TSA_URL is fatal on startup.
# Disable persistence: kind has no default PV provisioner for the ORCE PVC.
orce:
  enabled: true
  persistence:
    enabled: false

signing:
  # Wired as TSA_URL env var; fatal on startup if empty.
  tsaURL: "http://dcs-orce:1880/tsa/"
  # did:web host must resolve *inside the DCS pod* for the self-peer BDD scenarios
  # (FetchDIDDocumentFromHostname → http://localhost:8991/.well-known/did.json,
  # i.e. the DCS container itself). Percent-encoded colon per did:web spec.
  issuerDID: "did:web:localhost%3A8991"

route:
  basePath: "/digital-contracting-service"
  publicBaseURL: "http://localhost:18080/digital-contracting-service/api"

# Monitoring disabled: default storageClassName 'local-path' is not available in kind,
# causing Prometheus/Alertmanager PVCs to stay Pending and helm --wait to time out.
monitoring:
  enabled: false
grafana:
  enabled: false
prometheus:
  enabled: false
alertmanager:
  enabled: false
nodeExporter:
  enabled: false
kubeStateMetrics:
  enabled: false
