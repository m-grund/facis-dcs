# BDD test values: used by tests/bdd/Makefile kind_deploy target (kind cluster).
# Assumes release name "dcs" (HELM_RELEASE default in the Makefile).
#
# Image is loaded into kind via 'kind load docker-image' before helm deploy,
# so Never prevents spurious registry pulls.
traefik:
  enabled: true
  fullnameOverride: traefik
  namespaceOverride: kube-system
  ingressClass:
    enabled: true
    isDefaultClass: true
  providers:
    kubernetesIngress:
      enabled: true
      allowEmptyServices: true
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  ports:
    web:
      port: 18080
      exposedPort: 18080
      hostPort: 18080

image:
  pullPolicy: Never

pdfCore:
  enabled: true
  image:
    repository: pdf-core
    tag: bdd
    pullPolicy: Never

extraEnv:
  - name: JWT_ALG_NONE_SUPPORTED
    value: "true"
  - name: AUTH_INSECURE_COOKIES
    value: "true"
  # Reciprocal trust for the @two-instance peer-trust scenarios
  # (features/17_peer_trust): instance B's DID (see values.bdd2.yml's own
  # DCS_TRUSTED_PEERS for the other half of this pair). Seeded at startup by
  # backend/cmd/dcs/main.go's seedTrustedPeersFromEnv.
  - name: DCS_TRUSTED_PEERS
    value: "did:web:dcs-b.localhost%3A18080"
  # Real deployment dispatch to the shipped ORCE contract-target-flow
  # (UC-05-01): the flow verifies the payload hash, acks synchronously, and
  # then POSTs the authoritative acknowledgement + a measured KPI back to
  # /contract/deployment/callback (see orce.extraEnv below for its half of
  # the wiring). Only instance A dispatches — signing commands forward to the
  # contract's Origin peer, so deployments always originate here; instance B
  # deliberately keeps CONTRACT_TARGET_URL unset.
  - name: CONTRACT_TARGET_URL
    value: "http://dcs-orce:1880/contract-target/deploy"

# DID identity (fatal on startup when missing). The <fullname>-identity
# Secret (identitySecretName helper) is published by the hsm-provision
# post-install/post-upgrade hook job, generated from the freshly provisioned
# in-cluster HSM token key.
identity:
  enabled: true

oid4vp:
  trust:
    statusListSkipJWSVerify: true

postgresql:
  enabled: true
  auth:
    username: dcs
    password: dcs
    database: dcs
  additionalDatabases: ["fc", "hydra", "statuslist"]
  persistence:
    enabled: false

keycloak:
  enabled: true
  service:
    type: ClusterIP
    port: 8080
  auth:
    adminUser: admin
    adminPassword: admin
  realm:
    import: true
  extraEnv:
    - name: KC_HOSTNAME
      value: "dcs-keycloak"
    - name: KC_HOSTNAME_PORT
      value: "8080"
    - name: KC_HOSTNAME_STRICT_HTTPS
      value: "false"
    - name: KC_HTTP_ENABLED
      value: "true"

nats:
  enabled: true

neo4j:
  enabled: true
  persistence:
    enabled: false

ingress:
  enabled: true
  className: traefik
  hosts:
    - host: localhost
      paths:
        # Default base route (what the no-paths default would render) ...
        - path: /digital-contracting-service
          pathType: Prefix
        # ... plus the domain-level DID document: backend/design/did.go mounts
        # /.well-known/did.json on the root mux (did:web semantics), outside
        # DCS_API_PATH, so the BDD harness needs it routed at the origin root.
        # Full path (not /.well-known): hydra.route.paths already claims the
        # /.well-known prefix for OIDC discovery, and the longer path wins.
        - path: /.well-known/did.json
          pathType: Prefix
    # Cluster-routable did:web hostname for this instance (@two-instance
    # peer-trust suite, features/17_peer_trust): dcs-a.localhost
    # resolves in-cluster via a CoreDNS rewrite to the shared Traefik Service
    # (tests/bdd/scripts/kind_coredns_rewrite.sh) and, host-side, via the
    # RFC 6761 *.localhost fallback resolver in environment.py. Same paths as
    # the host-agnostic "localhost" rule above, which stays untouched — both
    # host rules route to this same release's backend Service.
    - host: dcs-a.localhost
      paths:
        - path: /digital-contracting-service
          pathType: Prefix
        - path: /.well-known/did.json
          pathType: Prefix

hydra:
  enabled: true
  config:
    dsn: "postgres://dcs:dcs@dcs-postgresql:5432/hydra?sslmode=disable"
    dev: true
    selfIssuerURL: "http://localhost:18080"
    loginURL: "http://localhost:18080/digital-contracting-service/ui/"
    consentURL: "http://localhost:18080/digital-contracting-service/api/auth/consent"
    logoutURL: "http://localhost:18080/digital-contracting-service/api/auth/logout-complete"
  secrets:
    system: "bdd-hydra-system-secret-change-me"
  clients:
    - client_id: dcs-client
      client_secret: dcs-secret
      grant_types: ["authorization_code", "refresh_token"]
      response_types: ["code"]
      scope: "openid offline_access"
      redirect_uris: ["http://localhost:18080/digital-contracting-service/api/auth/callback"]
      post_logout_redirect_uris: ["http://localhost:18080/digital-contracting-service/api/auth/logout-complete"]
      token_endpoint_auth_method: client_secret_post
      skip_consent: true

federatedCatalogue:
  enabled: true
  apiURL: "http://dcs-federated-catalogue:8081"
  oauth:
    clientID: "dcs-fc-client"
    clientSecret: "dcs-fc-client-secret"
  keycloak:
    hostname: "dcs-keycloak:8080"
    issuerScheme: "http"
  verificationVpSignature: false
  verificationVcSignature: false

fcKeycloak:
  realmURL: "http://dcs-keycloak:8080/realms/gaia-x"

# SoftHSM2 software token holding every private key (DCS-IR-HI-01), provisioned
# in-cluster with all five ECDSA P-256 keys and the C2PA x5chain. hsm.Open is
# fatal on startup, so the backend waits for the provisioning job's token via an
# initContainer. SoftHSM2 is a software token for CI only, never a production HSM.
pkcs11:
  tokenLabel: dcs
  pin: "1234"
  provisioning:
    enabled: true
    soPin: "12345678"

# XFSC Status List Service: required (fatal on startup if STATUSLIST_SERVICE_URL unreachable).
statuslistService:
  enabled: true
  tenantID: c2pa
  ingress:
    enabled: true
    className: traefik
    stripPrefix: /statuslist
    hosts:
      - host: localhost
        paths:
          - path: /statuslist
            pathType: Prefix
  database:
    enabled: true
    host: "dcs-postgresql"
    port: "5432"
    name: "statuslist"
    user: "dcs"
    password: "dcs"
    sslMode: "disable"
  nats:
    url: "nats://dcs-nats:4222"
  bddListInit:
    enabled: true
    tenantIDs:
      - credential
      - c2pa

statusListLocalhostProxy:
  enabled: true
  upstream: "http://traefik.kube-system.svc.cluster.local:18080"
  ingressHost: localhost

# IPFS: required — IPFS_TENANT_BASE_URL and IPFS_MFS_BASE_URL are fatal on startup.
ipfs:
  enabled: true
  persistence:
    enabled: false

ipfsDocumentManager:
  enabled: true
  ipfs:
    host: "dcs-ipfs"
    apiGatewayURL: "http://dcs-ipfs:8080/ipfs"
    rpcApiPort: 5001
  config:
    serverMode: "debug"

# ORCE (Timestamp Authority): required — TSA_URL is fatal on startup.
# Disable persistence: kind has no default PV provisioner for the ORCE PVC.
# Ingress exposes the contract-target-flow's HTTP-in endpoint
# (POST /contract-target/deploy) through the shared Traefik at the public
# origin, so the BDD runner reaches it without a port-forward — identical
# path locally and on CI. The /tsa flow itself signs locally (localTSA in the
# orce chart) — no external timestamp authority is contacted.
orce:
  enabled: true
  persistence:
    enabled: false
  # The contract-target-flow's callback legs (deployment ack + measured KPI,
  # flows/contract-target-flow.json) post to this instance's backend with the
  # shared deployment-callback secret (command/callback.go's
  # DeploymentCallbackSecret; the value below is its BDD default, stated
  # explicitly so the pairing is visible in one place).
  extraEnv:
    # DCS_URL must carry the API base path (DCS_API_PATH mounts every app
    # endpoint under /digital-contracting-service/api) — the flow's callback
    # legs append /contract/deployment/callback to it.
    - name: DCS_URL
      value: "http://dcs-digital-contracting-service:8991/digital-contracting-service/api"
    - name: DEPLOYMENT_CALLBACK_SECRET
      value: "bdd-deployment-callback-secret"
  ingress:
    enabled: true
    hosts:
      - host: "localhost"
        path: /contract-target

signing:
  # Wired as TSA_URL env var; fatal on startup if empty.
  tsaURL: "http://dcs-orce:1880/tsa/"
  # In-cluster dev TSA (orce chart localTSA): verify tokens against the
  # provisioned dev TSA cert instead of the embedded production cert.
  tsaTrustCertSecret: "dcs-orce-tsa-material"
  # did:web host must be reachable both from outside the cluster (host-side
  # BDD steps resolving via environment.py's *.localhost fallback) and from
  # inside the DCS pod itself (dcs_to_dcs.go's did:web challenge-response
  # resolves https://<hostname>/.well-known/did.json — including this
  # instance's OWN hostname for the self-peer BDD scenarios). dcs-a.localhost
  # resolves in-cluster via the CoreDNS rewrite
  # (tests/bdd/scripts/kind_coredns_rewrite.sh) to the shared Traefik Service,
  # which routes it right back to this same instance (see the ingress host
  # rule above) — so this one hostname satisfies both cases. Percent-encoded
  # colon per did:web spec. Must equal route.didHostname below.
  issuerDID: "did:web:dcs-a.localhost%3A18080"

route:
  basePath: "/digital-contracting-service"
  publicBaseURL: "http://localhost:18080/digital-contracting-service/api"
  # Explicit did:web hostname override (see the 'didHostname' helper) — must
  # match signing.issuerDID's host component above.
  didHostname: "dcs-a.localhost:18080"

# Monitoring disabled: default storageClassName 'local-path' is not available in kind,
# causing Prometheus/Alertmanager PVCs to stay Pending and helm --wait to time out.
monitoring:
  enabled: false
grafana:
  enabled: false
prometheus:
  enabled: false
alertmanager:
  enabled: false
nodeExporter:
  enabled: false
kubeStateMetrics:
  enabled: false
