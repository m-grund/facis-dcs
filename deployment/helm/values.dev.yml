# Dev values: co-deploy all dependencies, skip the DCS app itself.
# Run the backend locally with `air` and the frontend with `vite`.
#
# Install:
#   helm install dcs ./deployment/helm -f ./deployment/helm/values.dev.yml
#
# Upgrade (after chart changes):
#   helm upgrade dcs ./deployment/helm -f ./deployment/helm/values.dev.yml
#
# Services exposed on localhost via NodePort (Rancher Desktop forwards these automatically):
#   PostgreSQL : localhost:30432
#   Keycloak   : localhost:30080  →  realm: http://localhost:30080/realms/gaia-x
#   Hydra public : localhost:30444
#   Hydra admin  : localhost:30085
#   NATS       : localhost:30422
#   Neo4j HTTP : localhost:30474
#   Neo4j Bolt : localhost:30687
#   FC service : localhost:30081
#   ORCE       : localhost:30180

# In development, don't deploy the DCS container since we run it locally
replicaCount: 0

# No private registry needed for local dev (all dep images are public)
imagePullSecrets: []
dockerRegistry:
  create: false

postgresql:
  enabled: true
  auth:
    username: dcs
    password: dcs
    database: dcs
  additionalDatabases: ["fc", "hydra"]
  persistence:
    enabled: false
  service:
    type: NodePort
    nodePort: 30432

keycloak:
  enabled: true
  service:
    type: NodePort
    port: 8080
    nodePort: 30080
  auth:
    adminUser: admin
    adminPassword: admin
  realm:
    import: true
  extraEnv:
    - name: KC_HOSTNAME
      value: "localhost"
    - name: KC_HOSTNAME_PORT
      value: "30080"
    - name: KC_HOSTNAME_STRICT_HTTPS
      value: "false"
    - name: KC_HTTP_ENABLED
      value: "true"

hydra:
  enabled: true
  service:
    type: NodePort
    publicPort: 4444
    adminPort: 4445
    publicNodePort: 30444
    adminNodePort: 30085
  config:
    dsn: "postgres://dcs:dcs@dcs-postgresql:5432/hydra?sslmode=disable"
    dev: true
    selfIssuerURL: "http://localhost:30444"
    loginURL: "http://localhost:5173/ui/"
    consentURL: "http://localhost:5173/api/auth/consent"
    logoutURL: "http://localhost:5173/api/auth/logout-complete"
  secrets:
    system: "dev-hydra-system-secret-change-me"
  clients:
    - client_id: dcs-client
      client_secret: dcs-secret
      grant_types: ["authorization_code", "refresh_token"]
      response_types: ["code"]
      scope: "openid offline_access"
      redirect_uris: ["http://localhost:5173/api/auth/callback"]
      post_logout_redirect_uris: ["http://localhost:5173/api/auth/logout-complete"]
      token_endpoint_auth_method: client_secret_post
      skip_consent: true

nats:
  enabled: true
  service:
    type: NodePort
    nodePort: 30422

neo4j:
  enabled: true
  persistence:
    enabled: false
  service:
    type: NodePort
    nodePortHttp: 30474
    nodePortBolt: 30687

federatedCatalogue:
  enabled: true
  service:
    type: NodePort
    nodePort: 30081
  keycloak:
    hostname: "localhost:30080"
    issuerScheme: "http"
  oauth:
    clientID: "dcs-fc-client"
  # Allow POSTing self-descriptions without signature verification in dev
  verificationVpSignature: false
  verificationVcSignature: false

fcKeycloak:
  realmURL: "http://localhost:30080/realms/gaia-x"

orce:
  enabled: false
  persistence:
    enabled: false
  service:
    type: NodePort
    nodePort: 30180

route:
  basePath: "/api"

vault:
  enabled: true
  injector:
    enabled: false
  server:
    dev:
      enabled: true
      devRootToken: root
