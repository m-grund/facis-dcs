# Production profile skeleton (SRS §6 item 3). Layered on top of values.yaml
# (`helm install -f values.yaml -f values.prod.yml`). This is intentionally a
# skeleton, not a filled-in deployment: production hostnames, registry, and
# secret-manager wiring are the operator's to fill in per ADR-1's swap-config
# story (dev-CA ↔ real PKI, SoftHSM2 ↔ real HSM by configuration only).
#
# Differs from values.acceptance.yml in exactly one structural way: PKCS#11
# provisioning is OFF. Production does not co-deploy a SoftHSM2 token; it
# points at a real, pre-provisioned HSM's PKCS#11 module. Everything else
# (secretKeyRef-only credentials, ingress/TLS, Hydra caveat) is the same
# pattern as acceptance.

replicaCount: 3

image:
  repository: "[registry]/digital-contracting-service"
  tag: ""   # pin an explicit release tag in production, never blank/latest

route:
  basePath: "/digital-contracting-service"
  publicBaseURL: "https://dcs.example.org/digital-contracting-service"

ingress:
  enabled: true
  className: ""
  pathType: Prefix
  hosts:
    - host: dcs.example.org
      paths: []
  tls:
    - hosts: ["dcs.example.org"]
      secretName: dcs-prod-tls

database:
  url: ""
  secretRef:
    name: dcs-prod-db-credentials
    key: DATABASE_URL

# See values.acceptance.yml's comment: Hydra's system secret and client
# secrets have no secretKeyRef in this chart version yet — inject both via
# --set from your secret manager, never commit them.
hydra:
  enabled: true
  config:
    dev: false
    selfIssuerURL: "https://dcs.example.org"
    loginURL: "https://dcs.example.org/ui/"
    consentURL: "https://dcs.example.org/api/auth/consent"
    logoutURL: "https://dcs.example.org/api/auth/logout-complete"
  clients: []

# PKCS#11: production points at a REAL, pre-provisioned HSM — no
# in-cluster SoftHSM2 token, no provisioning job. The HSM's module path,
# token label, and key labels (dcs-c2pa, dcs-contract-pades, dcs-did, etc. —
# see backend/internal/base/hsm) must already exist on the HSM before this
# release is installed; this chart does not create HSM keys in production.
pkcs11:
  modulePath: ""   # e.g. /usr/lib/pkcs11/real-hsm.so, mounted via an extra volume
  tokenLabel: ""
  pin: ""
  pinSecretRef:
    name: dcs-prod-hsm-pin
    key: PKCS11_PIN
  provisioning:
    enabled: false

# pdf-core's PAdES/C2PA signing cert chain: with pkcs11.provisioning
# disabled, no hsm-provision job exists to publish this Secret, so it must
# be pre-created out-of-band from the real HSM's issued x5chain and
# referenced here — never generated by the chart in production.
pdfCore:
  signing:
    existingSecret: dcs-prod-pdf-core-signing

federatedCatalogue:
  enabled: true
  apiURL: ""
  secretRef:
    name: dcs-prod-fc-credentials
    key: FEDERATED_CATALOGUE_API_URL
  oauth:
    clientID: "dcs-fc-client"
    clientSecretSecretRef:
      name: dcs-prod-fc-credentials
      key: FEDERATED_CATALOGUE_CLIENT_SECRET

ipfs:
  enabled: true
  tenantBaseURLSecretRef:
    name: dcs-prod-ipfs-credentials
    key: IPFS_TENANT_BASE_URL
  mfsBaseURLSecretRef:
    name: dcs-prod-ipfs-credentials
    key: IPFS_MFS_BASE_URL
