replicaCount: 1

image:
  repository: "[registry]"
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

dockerRegistry:
  create: false
  secretName: "docker-registry"
  server: ""
  username: ""
  password: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8991

serviceMonitor:
  enabled: false

ingress:
  enabled: false
  className: ""
  annotations: {}
  pathType: Prefix
  hosts: []
  tls: []

# Istio VirtualService (optional)
istio:
  enabled: false
  hosts: []
  gateways: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

customCA:
  enabled: false
  configMapName: ""

hostAliases: []
nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraEnvFrom: []

# Route and path configuration
route:
  basePath: "/digital-contracting-service"

# Override individual paths (derived from route.basePath if not set)
paths:
  api: ""
  ui: ""

# Keycloak realm URL for Federated Catalogue.
fcKeycloak:
  realmURL: ""

# Database connection – derived from the postgresql sub-chart when not set explicitly
database:
  url: ""
  port: 5432
  user: ""
  password: ""
  name: ""
  sslmode: "disable"
  secretRef:
    name: ""
    key: "DATABASE_URL"

# NATS connection – derived from the nats sub-chart when not set explicitly
messaging:
  natsURL: ""
  natsPort: 4222
  secretRef:
    name: ""
    key: "NATS_URL"

# Service discovery overrides – all auto-wired when the sub-charts below are enabled
serviceDiscovery:
  postgresqlHost: ""
  keycloakHost: ""
  natsHost: ""
  keycloakPort: ""

# ---- Co-deployed dependencies ----------------------------------------
# Each sub-chart owns its full set of configurable values.
# Only fields referenced by the parent chart's helpers are listed here.
# All other sub-chart options (images, resources, persistence, etc.) can
# be set directly in your values override file.

postgresql:
  enabled: false
  auth:
    username: dcs
    password: dcs
    database: dcs

keycloak:
  enabled: false
  service:
    port: 8080
  route:
    path: ""

hydra:
  enabled: false
  clients: []

nats:
  enabled: false

neo4j:
  enabled: false

# XFSC Federated Catalogue (requires neo4j, keycloak, postgresql with "fc" database)
# See charts/federated-catalogue/values.yaml for all configurable fields.
federatedCatalogue:
  enabled: false
  # URL the DCS backend uses to reach the Federated Catalogue API
  apiURL: ""
  secretRef:
    name: ""
    key: "FEDERATED_CATALOGUE_API_URL"
  # Keycloak client_credentials for outbound FC API calls
  oauth:
    clientID: "dcs-fc-client"
    clientSecret: ""
    clientSecretSecretRef:
      name: ""
      key: "FEDERATED_CATALOGUE_CLIENT_SECRET"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ---- Optional monitoring stack (Prometheus, Grafana, Alertmanager) ----------------
monitoring:
  enabled: false

grafana:
  enabled: false
  adminPassword: YourStrongPassword
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi

prometheus:
  enabled: false
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    serviceMonitorSelectorNilUsesHelmValues: true
    podMonitorSelectorNilUsesHelmValues: true

alertmanager:
  enabled: false
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: false