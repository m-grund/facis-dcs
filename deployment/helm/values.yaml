ipfs:
  enabled: false
  tenantBaseURL: ""
  mfsBaseURL: ""
  tenantBaseURLSecretRef:
    name: ""
    key: "IPFS_TENANT_BASE_URL"
  mfsBaseURLSecretRef:
    name: ""
    key: "IPFS_MFS_BASE_URL"

ipfsDocumentManager:
  enabled: false

# IPFS Document Manager client – auto-wired when sub-charts are enabled
ipfsClient:
  tenantName: "tenant_space"  # tenant identifier in the Document Manager URL path
  tenantBaseURL: ""            # IPFS_TENANT_BASE_URL explicit override
  mfsBaseURL: ""               # IPFS_MFS_BASE_URL explicit override (Kubo RPC API)

customPolicyAgent:
  enabled: false
  mongo:
    uri: ""
    database: "policy"
    collectionName: "policy"
  nats:
    url: ""
  auth:
    jwkURL: ""
  logging:
    level: "info"
    format: "json"

# ---- Optional monitoring stack (Prometheus, Grafana, Alertmanager) ----------------
monitoring:
  enabled: false

grafana:
  enabled: false
  adminPassword: YourStrongPassword
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi

prometheus:
  enabled: false
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    serviceMonitorSelectorNilUsesHelmValues: true
    podMonitorSelectorNilUsesHelmValues: true

alertmanager:
  enabled: false
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: false
