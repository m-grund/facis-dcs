replicaCount: 1

image:
  repository: "[registry]"
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

dockerRegistry:
  create: false
  secretName: "docker-registry"
  server: ""
  username: ""
  password: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8991

serviceMonitor:
  enabled: false

ingress:
  enabled: false
  className: ""
  annotations: {}
  pathType: Prefix
  hosts: []
  tls: []

# Istio VirtualService (optional)
istio:
  enabled: false
  hosts: []
  gateways: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

customCA:
  enabled: false
  configMapName: ""

hostAliases: []
nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
extraEnvFrom: []

# Route and path configuration
route:
  basePath: "/digital-contracting-service"

# Override individual paths (derived from route.basePath if not set)
paths:
  api: ""
  ui: ""

# OIDC / authentication
# issuerURL is derived from keycloak.route.path + istio/ingress host when not set explicitly
oidc:
  issuerURL: ""
  clientID: "[oidc-client-id]"
  redirectURI: "[oidc-redirect-uri]"
  logoutRedirectURI: "[oidc-logout-redirect-uri]"
  realm: "gaia-x"
  keycloakScheme: "https"
  issuerURLSecretRef:
    name: ""
    key: "OIDC_ISSUER_URL"

# Database connection – derived from the postgresql sub-chart when not set explicitly
database:
  url: ""
  port: 5432
  user: ""
  password: ""
  name: ""
  sslmode: "disable"
  secretRef:
    name: ""
    key: "DATABASE_URL"

# NATS connection – derived from the nats sub-chart when not set explicitly
messaging:
  natsURL: ""
  natsPort: 4222
  secretRef:
    name: ""
    key: "NATS_URL"

# Service discovery overrides – all auto-wired when the sub-charts below are enabled
serviceDiscovery:
  postgresqlHost: ""
  keycloakHost: ""
  natsHost: ""
  keycloakPort: ""

# ---- Signing / C2PA provenance ----------------------------------------
# DCS never holds private keys (DCS-IR-HI-01). Set these when connecting to
# an external Crypto Provider Service or relying on the co-deployed one below.

signing:
  # DID of this DCS instance (embedded in C2PA lifecycle assertions as authority).
  issuerDID: ""
  issuerDIDSecretRef:
    name: ""
    key: "ISSUER_DID"

  # RFC 3161 Timestamp Authority (optional; activates real timestamps on C2PA manifests).
  tsaURL: ""

  # XFSC Crypto Provider Service URL. Leave empty when cryptoProvider.enabled=true
  # (auto-derived from the co-deployed signer service).
  cryptoProviderURL: ""
  cryptoProviderURLSecretRef:
    name: ""
    key: "CRYPTO_PROVIDER_URL"

  # Vault transit mount path and key name.
  # Taken from cryptoProvider.transit.* when co-deploying.
  cryptoProviderNamespace: ""
  cryptoProviderKey: ""

# ---- IPFS storage -------------------------------------------------------
# Required for PDF/C2PA storage. No co-deployed subchart (IPFS is assumed
# to be provided by the deployment environment or an external IPFS node).
ipfs:
  tenantBaseURL: ""
  mfsBaseURL: ""
  tenantBaseURLSecretRef:
    name: ""
    key: "IPFS_TENANT_BASE_URL"
  mfsBaseURLSecretRef:
    name: ""
    key: "IPFS_MFS_BASE_URL"

# ---- Co-deployed dependencies ----------------------------------------
# Each sub-chart owns its full set of configurable values.
# Only fields referenced by the parent chart's helpers are listed here.
# All other sub-chart options (images, resources, persistence, etc.) can
# be set directly in your values override file.

postgresql:
  enabled: false
  auth:
    username: dcs
    password: dcs
    database: dcs

keycloak:
  enabled: false
  service:
    port: 8080
  route:
    path: ""

nats:
  enabled: false

neo4j:
  enabled: false

# XFSC Crypto Provider Service + HashiCorp Vault (transit engine).
# When enabled, CRYPTO_PROVIDER_URL is auto-derived and wired into DCS.
# See charts/crypto-provider/values.yaml for the full set of options.
cryptoProvider:
  enabled: false
  vault:
    dev:
      enabled: true
      rootToken: "root"
    service:
      port: 8200
  transit:
    mount: "transit"
    key: "dcs-signing-key"
    keyType: "ed25519"

# XFSC Federated Catalogue (requires neo4j, keycloak, postgresql with "fc" database)
# See charts/federated-catalogue/values.yaml for all configurable fields.
federatedCatalogue:
  enabled: false
  # URL the DCS backend uses to reach the Federated Catalogue API
  apiURL: ""
  secretRef:
    name: ""
    key: "FEDERATED_CATALOGUE_API_URL"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# ---- Optional monitoring stack (Prometheus, Grafana, Alertmanager) ----------------
monitoring:
  enabled: false

grafana:
  enabled: false
  adminPassword: YourStrongPassword
  persistence:
    enabled: true
    storageClassName: local-path
    size: 5Gi

prometheus:
  enabled: false
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    serviceMonitorSelectorNilUsesHelmValues: true
    podMonitorSelectorNilUsesHelmValues: true

alertmanager:
  enabled: false
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

nodeExporter:
  enabled: false

kubeStateMetrics:
  enabled: false