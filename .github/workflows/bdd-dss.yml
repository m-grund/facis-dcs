name: DSS signing (kind)

# Proves the QES/AES signing ceremony end-to-end through a REAL remote EU DSS
# (DCS-IR-SI-10): deploys the single instance with DCS_SIGNER_BACKEND=dss and
# the dss subchart (conectx/dss-demo:6.2.1), then runs the real signing vertical
# so the same PAdES/visible-AcroForm/JAdES assertions the default suite checks
# are produced by the DSS instead of the in-process pdf-core path.
#
# Kept as its own dispatchable workflow (not part of the always-on suite): the
# DSS webapp image is ~1.3GB and boots slowly, so this runs on demand rather
# than gating every push.

on:
  workflow_dispatch:

jobs:
  bdd-dss:
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: bdd-dss-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install kind
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.23.0

      - name: Run signing vertical against a real DSS
        run: |
          set -euo pipefail
          make -C tests/bdd run_bdd_dss_kind_ci \
            KIND_CLUSTER_NAME=dcs-bdd \
            DOCKER_IMAGE_REPOSITORY=digital-contracting-service \
            DOCKER_IMAGE_TAG=bdd

      - name: Dump namespace info on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide || true
          kubectl logs -n dcs-bdd -l app.kubernetes.io/name=dss --tail=200 --prefix || true
          kubectl logs -n dcs-bdd -l app.kubernetes.io/component=backend -c digital-contracting-service --tail=200 --prefix || true

      - name: Teardown kind cluster
        if: always()
        run: |
          make -C tests/bdd kind_delete KIND_CLUSTER_NAME=dcs-bdd || true
