name: BDD on kind

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  # The BDD (behave) suite and the Playwright E2E each deploy their OWN
  # two-instance kind stack and run in parallel on separate runners: wall-clock
  # is max(bdd, e2e) instead of bdd+e2e, and each gets a full disk/memory budget
  # (the heavy DSS bundle + both DCS instances no longer share one runner).
  bdd-kind:
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: bdd-kind-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The kind node loads the heavy DSS demo bundle (~1-2GB) alongside the two
      # DCS images, pdf-core, and the Postgres/Keycloak/IPFS/ORCE/FC base images;
      # on a stock runner (~14GB free) this intermittently exhausts the disk
      # ("No space left on device" mid pip-install). Reclaim the preinstalled
      # toolchains this job never uses.
      - name: Free up disk space
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/share/swift || true
          sudo docker image prune -af || true
          echo "After:"; df -h /

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      # Restore the BDD venv itself so setup_environment's reinstall is
      # "already satisfied" (no re-download/rebuild of cryptography + the
      # bdd-executor deps). setup_environment still reinstalls on top, so a
      # requirements/Makefile change is always picked up.
      - name: Cache BDD Python venv
        uses: actions/cache@v4
        with:
          path: tests/bdd/.venv
          key: bdd-venv-py312-${{ hashFiles('testWallet/requirements.txt', 'tests/bdd/Makefile') }}
          restore-keys: |
            bdd-venv-py312-

      # The DSS demo image is the single largest external pull (~1-2GB). Cache a
      # docker-save tarball and load it so kind_load_dss_image's `docker image
      # inspect` skips the pull on a hit.
      - name: Cache DSS demo image
        id: dss-cache
        uses: actions/cache@v4
        with:
          path: /tmp/dss-image.tar
          key: dss-image-conectx-dss-demo-6.2.1
      - name: Load cached DSS image
        if: steps.dss-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/dss-image.tar

      # buildx + the GitHub Actions layer cache persist the DCS/pdf-core image
      # layers (base image, go mod download) across runs. The runtime helper
      # exposes the cache tokens `type=gha` needs to a plain `run:` step.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Expose GitHub Actions cache to buildx
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Install kind
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.23.0

      - name: Run kind-backed BDD suite
        run: |
          set -euo pipefail
          make -C tests/bdd run_bdd_kind_ci \
            KIND_CLUSTER_NAME=dcs-bdd \
            DOCKER_IMAGE_REPOSITORY=digital-contracting-service \
            DOCKER_IMAGE_TAG=bdd \
            DOCKER_BUILD="docker buildx build --load" \
            DCS_BUILD_CACHE="--cache-from type=gha,scope=dcs-image --cache-to type=gha,mode=max,scope=dcs-image" \
            PDF_CORE_BUILD_CACHE="--cache-from type=gha,scope=pdf-core-image --cache-to type=gha,mode=max,scope=pdf-core-image"

      - name: Save DSS image to cache
        if: always() && steps.dss-cache.outputs.cache-hit != 'true'
        run: docker save conectx/dss-demo:6.2.1 -o /tmp/dss-image.tar || true

      - name: Dump namespace info on failure
        if: failure()
        # kubectl must target the kind cluster's kubeconfig (the Makefile writes
        # it to tests/bdd/.tmp/kind-kubeconfig); otherwise it hits the default
        # context and reports "namespaces dcs-bdd not found", hiding the logs
        # (e.g. a DSS-down flake in the signing suite).
        env:
          KUBECONFIG: ${{ github.workspace }}/tests/bdd/.tmp/kind-kubeconfig
        run: |
          set -euo pipefail
          kubectl get pods -n dcs-bdd -o wide || true
          kubectl get events -n dcs-bdd --sort-by=.lastTimestamp || true
          kubectl logs -n dcs-bdd -l app.kubernetes.io/component=backend \
            -c digital-contracting-service --tail=2000 --prefix || true
          kubectl logs -n dcs-bdd -l app.kubernetes.io/component=backend \
            -c digital-contracting-service --tail=200 --prefix --previous || true
          kubectl logs -n dcs-bdd -l app.kubernetes.io/component=pdf-core --tail=100 --prefix || true
          kubectl logs -n dcs-bdd -l app.kubernetes.io/component=dss --tail=100 --prefix || true
          kubectl logs deployment/dcs-keycloak -n dcs-bdd --tail=200 || true
          kubectl logs -n dcs-bdd job/dcs-digital-contracting-service-hsm-provision --tail=100 || true

      - name: Generate coverage XML and summary
        if: always()
        run: |
          set -euo pipefail
          if [[ -f .coverage ]] && [[ -x tests/bdd/.venv/bin/coverage ]]; then
            tests/bdd/.venv/bin/coverage xml -o tests/bdd/.reports/coverage.xml
            tests/bdd/.venv/bin/coverage report | tee tests/bdd/.reports/coverage.txt
            {
              echo "## BDD Coverage"
              echo ""
              echo '```text'
              cat tests/bdd/.reports/coverage.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No coverage data file found (.coverage) or coverage binary missing; skipping coverage summary."
          fi

      - name: Publish BDD test report
        if: always() && hashFiles('tests/bdd/.reports/junit/*.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: BDD Test Results
          path: tests/bdd/.reports/junit/*.xml
          reporter: java-junit
          fail-on-error: false
          list-suites: all
          list-tests: all

      - name: Upload BDD reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-reports
          path: tests/bdd/.reports/**
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 30

      - name: Teardown kind cluster
        if: always()
        run: |
          set -euo pipefail
          make -C tests/bdd kind_delete KIND_CLUSTER_NAME=dcs-bdd || true

  e2e-playwright:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: e2e-playwright-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/share/swift || true
          sudo docker image prune -af || true
          echo "After:"; df -h /

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      # Restore the BDD venv itself so setup_environment's reinstall is
      # "already satisfied" (no re-download/rebuild of cryptography + the
      # bdd-executor deps). setup_environment still reinstalls on top, so a
      # requirements/Makefile change is always picked up.
      - name: Cache BDD Python venv
        uses: actions/cache@v4
        with:
          path: tests/bdd/.venv
          key: bdd-venv-py312-${{ hashFiles('testWallet/requirements.txt', 'tests/bdd/Makefile') }}
          restore-keys: |
            bdd-venv-py312-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/ClientApp/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend/ClientApp

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/ClientApp/package-lock.json') }}

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: frontend/ClientApp

      - name: Cache DSS demo image
        id: dss-cache
        uses: actions/cache@v4
        with:
          path: /tmp/dss-image.tar
          key: dss-image-conectx-dss-demo-6.2.1
      - name: Load cached DSS image
        if: steps.dss-cache.outputs.cache-hit == 'true'
        run: docker load -i /tmp/dss-image.tar

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Expose GitHub Actions cache to buildx
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Install kind
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.23.0

      - name: Run Playwright E2E on its own kind stack
        run: |
          set -euo pipefail
          make -C tests/bdd run_e2e_kind_ci \
            KIND_CLUSTER_NAME=dcs-e2e \
            DOCKER_IMAGE_REPOSITORY=digital-contracting-service \
            DOCKER_IMAGE_TAG=bdd \
            DOCKER_BUILD="docker buildx build --load" \
            DCS_BUILD_CACHE="--cache-from type=gha,scope=dcs-image --cache-to type=gha,mode=max,scope=dcs-image" \
            PDF_CORE_BUILD_CACHE="--cache-from type=gha,scope=pdf-core-image --cache-to type=gha,mode=max,scope=pdf-core-image"

      - name: Save DSS image to cache
        if: always() && steps.dss-cache.outputs.cache-hit != 'true'
        run: docker save conectx/dss-demo:6.2.1 -o /tmp/dss-image.tar || true

      - name: Upload Playwright report
        if: always() && hashFiles('frontend/ClientApp/playwright-report/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/ClientApp/playwright-report/**
          retention-days: 30

      - name: Upload vertical PDF artifacts
        if: always() && hashFiles('frontend/ClientApp/vertical-artifacts/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: vertical-pdf-artifacts
          path: frontend/ClientApp/vertical-artifacts/**
          retention-days: 30

      - name: Dump namespace info on failure
        if: failure()
        # The e2e stack runs in the dcs-e2e kind cluster, whose kubeconfig the
        # Makefile writes to tests/bdd/.tmp/kind-kubeconfig. Without pointing
        # kubectl at it this step used the default context and reported
        # "namespaces dcs-bdd not found", hiding both instances' logs. The
        # backend selector matches BOTH releases (dcs + dcs2), so --prefix
        # distinguishes instance A's synchronizer/pdf-gen from instance B's PostPdf.
        env:
          KUBECONFIG: ${{ github.workspace }}/tests/bdd/.tmp/kind-kubeconfig
        run: |
          set -euo pipefail
          kubectl get pods -n dcs-bdd -o wide || true
          kubectl get events -n dcs-bdd --sort-by=.lastTimestamp || true
          # Per-deployment so both instances (dcs + dcs2) are captured whole and a
          # large tail keeps the export/regeneration diagnostics that fire near the
          # end of a run inside the window.
          for dep in $(kubectl get deploy -n dcs-bdd -o name | grep -E 'digital-contracting-service$'); do
            echo "===== logs $dep ====="
            kubectl logs -n dcs-bdd "$dep" -c digital-contracting-service --tail=2000 --prefix || true
          done
          kubectl logs -n dcs-bdd -l app.kubernetes.io/component=pdf-core --tail=400 --prefix || true
          kubectl logs deployment/dcs-keycloak -n dcs-bdd --tail=100 || true

      - name: Teardown kind cluster
        if: always()
        run: |
          set -euo pipefail
          make -C tests/bdd kind_delete KIND_CLUSTER_NAME=dcs-e2e || true
